<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="#7B9E87"/>

  <!-- Grand piano body (side view) -->
  <!-- Main body shape -->
  <path d="M 30 130
             L 30 75
             Q 30 60 50 58
             L 130 58
             Q 160 58 168 80
             Q 175 100 160 115
             Q 148 125 130 128
             L 80 130 Z"
        fill="#1a1a1a"/>

  <!-- Piano lid (open, propped up) -->
  <path d="M 50 58
             L 130 58
             Q 158 58 166 78
             L 115 52
             Q 90 44 60 50 Z"
        fill="#2a2a2a"/>

  <!-- Lid highlight -->
  <path d="M 55 57
             L 125 57
             Q 148 57 158 72
             L 118 51
             Q 94 45 63 50 Z"
        fill="#3a3a3a" opacity="0.6"/>

  <!-- Piano rim / edge highlight -->
  <path d="M 30 75 Q 30 60 50 58 L 130 58 Q 160 58 168 80 Q 175 100 160 115 Q 148 125 130 128 L 80 130 L 30 130 L 30 75"
        fill="none" stroke="#3d3d3d" stroke-width="2"/>

  <!-- Keyboard area -->
  <rect x="38" y="105" width="110" height="22" rx="3" fill="#f0f0f0"/>

  <!-- White keys dividers -->
  <line x1="54" y1="105" x2="54" y2="127" stroke="#ccc" stroke-width="1"/>
  <line x1="70" y1="105" x2="70" y2="127" stroke="#ccc" stroke-width="1"/>
  <line x1="86" y1="105" x2="86" y2="127" stroke="#ccc" stroke-width="1"/>
  <line x1="102" y1="105" x2="102" y2="127" stroke="#ccc" stroke-width="1"/>
  <line x1="118" y1="105" x2="118" y2="127" stroke="#ccc" stroke-width="1"/>
  <line x1="134" y1="105" x2="134" y2="127" stroke="#ccc" stroke-width="1"/>

  <!-- Black keys -->
  <rect x="47" y="105" width="9" height="13" rx="1.5" fill="#1a1a1a"/>
  <rect x="63" y="105" width="9" height="13" rx="1.5" fill="#1a1a1a"/>
  <rect x="95" y="105" width="9" height="13" rx="1.5" fill="#1a1a1a"/>
  <rect x="111" y="105" width="9" height="13" rx="1.5" fill="#1a1a1a"/>
  <rect x="127" y="105" width="9" height="13" rx="1.5" fill="#1a1a1a"/>

  <!-- Piano legs -->
  <rect x="40" y="130" width="8" height="18" rx="3" fill="#1a1a1a"/>
  <rect x="72" y="130" width="8" height="20" rx="3" fill="#1a1a1a"/>

  <!-- Pedals -->
  <ellipse cx="50" cy="150" rx="6" ry="3" fill="#b8960c" opacity="0.9"/>
  <ellipse cx="65" cy="152" rx="6" ry="3" fill="#b8960c" opacity="0.9"/>
  <ellipse cx="80" cy="152" rx="6" ry="3" fill="#b8960c" opacity="0.9"/>

  <!-- Body shine/reflection -->
  <path d="M 45 70 Q 60 65 90 66 Q 80 72 50 74 Z" fill="white" opacity="0.08"/>
</svg>
