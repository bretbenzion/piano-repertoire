// ─── HOME SCREEN ─────────────────────────────────────────────────────────────
function renderHomeScreen() {
  let viewMode='work', sortMode='recent', filterTag='Current', searchQuery='', searchOpen=false;
  const screen=div({className:'screen'});
  const header=div({style:{padding:'16px 16px 12px',borderBottom:'1px solid var(--border)',flexShrink:'0'}});

  // Search input lives outside buildHeader so it is never recreated (preserves focus & value)
  const searchInp=el('input',{type:'search',placeholder:'Search works & composers…',className:'search-inp',
    style:{display:'none',marginBottom:'10px',width:'100%'}});
  searchInp.addEventListener('input',()=>{searchQuery=searchInp.value.trim().toLowerCase();buildList();});

  function searchIcon() {
    const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
    s.setAttribute('viewBox','0 0 24 24'); s.setAttribute('width','20'); s.setAttribute('height','20');
    s.setAttribute('fill','none'); s.setAttribute('stroke','currentColor');
    s.setAttribute('stroke-width','2'); s.setAttribute('stroke-linecap','round');
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx','10'); c.setAttribute('cy','10'); c.setAttribute('r','6');
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1','14.5'); l.setAttribute('y1','14.5'); l.setAttribute('x2','20'); l.setAttribute('y2','20');
    s.appendChild(c); s.appendChild(l); return s;
  }

  function buildHeader() {
    header.innerHTML='';
    const themes = ['serif','sans','rubik','clarendon'];
    const icons  = {'serif':'A','sans':'𝒜','rubik':'R','clarendon':'C'};
    const bgs    = {'serif':'#F5F4F0','sans':'#F6F7FB','rubik':'#F6F7FB','clarendon':'#F5F3EE'};
    const cur = themes.find(t=>document.body.classList.contains('theme-'+t)) || 'serif';
    const next = themes[(themes.indexOf(cur)+1) % themes.length];
    const themeBtn=btn({className:'btn-icon',style:{fontSize:'16px'},title:'Toggle theme',
      onClick:()=>{
        themes.forEach(t=>document.body.classList.remove('theme-'+t));
        if(next!=='serif') document.body.classList.add('theme-'+next);
        localStorage.setItem('repertoire_theme', next);
        document.getElementById('theme-color-meta').content = bgs[next];
        buildHeader();
      }}, icons[cur]);
    const srchBtn=btn({className:'btn-icon',style:{fontSize:'20px'},title:'Search',
      onClick:()=>{
        searchOpen=!searchOpen;
        searchInp.style.display=searchOpen?'block':'none';
        if(searchOpen) searchInp.focus();
        else{searchInp.value='';searchQuery='';buildList();}
      }}, searchIcon());

    // Top row: title + icons
    header.appendChild(div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},
      span({style:{fontSize:'20px',color:'var(--text)'}},'Repertoire'),
      div({style:{display:'flex',gap:'4px',alignItems:'center'}},
        btn({className:'btn-icon',style:{fontSize:'18px',marginRight:'2px'},title:'Backup & Restore',onClick:()=>dataModal(reload)},'\u2b06\ufe0e'),
        btn({className:'btn-icon',style:{fontSize:'16px',marginRight:'2px'},title:'AI Settings',onClick:()=>apiKeyModal()},'\u2699\ufe0e'),
        themeBtn, srchBtn
      )
    ));
    header.appendChild(searchInp);

    // View toggle row
    const viewRow=div({style:{display:'flex',gap:'6px',marginBottom:'10px'}});
    for (const [v,label] of [['composer','Composer'],['work','Works']]) {
      const b=btn({className:'pill'+(viewMode===v?' active':''),onClick:()=>{
        viewMode=v;
        // Reset filter/sort defaults per view
        if(v==='composer'){searchOpen=false;searchInp.style.display='none';searchInp.value='';searchQuery='';}
        buildList();
      }},label);
      viewRow.appendChild(b);
    }
    // Sort pills — only shown in work view
    if (viewMode==='work') {
      viewRow.appendChild(div({style:{flex:'1'}})); // spacer
      for (const [s,label] of [['recent','Recent'],['alpha','A–Z']]) {
        const b=btn({className:'pill'+(sortMode===s?' active':''),onClick:()=>{sortMode=s;buildList();}},label);
        viewRow.appendChild(b);
      }
    }
    header.appendChild(viewRow);

    // Filter chips — only in work view
    if (viewMode==='work') {
      const chips=div({className:'chips'});
      for (const tag of ['All',...TAGS]) {
        const color=TAG_COLOR[tag];
        const b=btn({className:'pill',onClick:()=>{filterTag=tag;buildList();}},tag);
        if(filterTag===tag){b.style.background=color||'var(--accent)';b.style.color='#fff';b.style.borderColor=color||'var(--accent)';}
        chips.appendChild(b);
      }
      header.appendChild(chips);
    }
  }

  // Last session timestamp across all movements — 0 if none ever logged
  function workRecency(workId) {
    const movs=IDX.movsByWork.get(workId)||[];
    return movs.reduce((best,m)=>Math.max(best,m.lastSessionAt||0),0);
  }

  // Movement recency — for mixed-tag sorting
  function movRecency(m) { return m.lastSessionAt||0; }

  // ── Work row: used in both search and work view ──
  function workRow(w) {
    const comp=IDX.composerById.get(w.composerId);
    const movCount=(IDX.movsByWork.get(w.id)||[]).length;
    const wTag=computeWorkTag(w.id);
    const mastery=workMastery(w.id);
    return div({className:'row',onClick:()=>navigate({screen:'work',workId:w.id,composerName:comp?.name||''})},
      div({style:{flex:'1'}},
        div({style:{fontSize:'16px',color:'var(--text)'}},w.title),
        div({style:{fontSize:'13px',color:'var(--sub)',marginTop:'2px'}},
          movCount+' movement'+(movCount!==1?'s':'')+' \u00b7 '+(comp?.name||'')
        )
      ),
      div({style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'4px',flexShrink:'0',marginLeft:'8px'}},
        tagChip(wTag),
        movCount>0?span({style:{fontSize:'13px',color:'var(--sub)'}},(pct(mastery))):null
      )
    );
  }

  // ── Movement row (for mixed-tag works in work view) ──
  function movRow(m, w) {
    const comp=IDX.composerById.get(w.composerId);
    const movTag=computeMovTag(m);
    const mastery=movMastery(m);
    const movs=IDX.movsByWork.get(w.id)||[];
    const subtitle = w.title + (comp?' \u00b7 '+comp.name:'');
    const movIdx=movs.findIndex(x=>x.id===m.id);
    const tabIdx=movs.length>1 ? movIdx+1 : 0;
    return div({className:'row',onClick:()=>navigate({screen:'work',workId:w.id,composerName:comp?.name||'',tabIdx})},
      div({style:{flex:'1'}},
        div({style:{fontSize:'16px',color:'var(--text)'}},m.name),
        div({style:{fontSize:'13px',color:'var(--sub)',marginTop:'2px'}},subtitle)
      ),
      div({style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'4px',flexShrink:'0',marginLeft:'8px'}},
        tagChip(movTag),
        span({style:{fontSize:'13px',color:'var(--sub)'}},pct(mastery))
      )
    );
  }

  const list=div({className:'scroll'});

  function buildList() {
    buildHeader();
    list.innerHTML='';

    if(!STATE.works.length){
      list.appendChild(div({className:'empty'},para({},'No repertoire yet.\nTap + to add your first piece.')));
      return;
    }

    // ── COMPOSER VIEW ──
    if(viewMode==='composer') {
      if(searchQuery) {
        // Search: flat list of works matching title or composer
        const q=searchQuery.toLowerCase();
        const matches=STATE.works.filter(w=>{
          const c=IDX.composerById.get(w.composerId);
          return w.title.toLowerCase().includes(q)||(c?.name||'').toLowerCase().includes(q);
        }).sort((a,b)=>a.title.localeCompare(b.title));
        if(!matches.length){list.appendChild(div({style:{padding:'32px',textAlign:'center'}},span({style:{color:'#9E9E9E'}},'No results.')));return;}
        for(const w of matches) list.appendChild(workRow(w));
        return;
      }
      const groups=STATE.composers.slice().sort((a,b)=>a.name.localeCompare(b.name))
        .map(c=>({composer:c,works:STATE.works.filter(w=>w.composerId===c.id).sort((a,b)=>a.title.localeCompare(b.title))}))
        .filter(g=>g.works.length>0);
      if(!groups.length){list.appendChild(div({style:{padding:'32px',textAlign:'center'}},span({style:{color:'#9E9E9E'}},'No works.')));return;}
      for(const {composer,works:cWorks} of groups) {
        list.appendChild(div({className:'row',onClick:()=>navigate({screen:'composer',composerName:composer.name})},
          div({},
            div({style:{fontSize:'16px',color:'var(--text)'}},composer.name),
            div({className:'small',style:{marginTop:'3px'}},cWorks.length+' work'+(cWorks.length!==1?'s':''))
          )
        ));
      }
      return;
    }

    // ── WORK VIEW ──
    // Filter works by tag
    let works=STATE.works.filter(w=>{
      if(filterTag==='All') return true;
      return computeWorkTag(w.id)===filterTag ||
        (IDX.movsByWork.get(w.id)||[]).some(m=>computeMovTag(m)===filterTag);
    });

    // Search filter
    if(searchQuery) {
      const q=searchQuery.toLowerCase();
      works=works.filter(w=>{
        const c=IDX.composerById.get(w.composerId);
        return w.title.toLowerCase().includes(q)||(c?.name||'').toLowerCase().includes(q)||
          (IDX.movsByWork.get(w.id)||[]).some(m=>m.name.toLowerCase().includes(q));
      });
    }

    if(!works.length){list.appendChild(div({style:{padding:'32px',textAlign:'center'}},span({style:{color:'#9E9E9E'}},'No works match this filter.')));return;}

    // Build flat list of items — whole works or individual movements for mixed-tag works
    // Interleaving them lets movement rows sort correctly against whole-work rows
    const items=[];
    for(const w of works) {
      const movs=IDX.movsByWork.get(w.id)||[];
      const wTag=computeWorkTag(w.id);
      if(wTag==='mixed') {
        const filtMovs=filterTag==='All'?movs:movs.filter(m=>computeMovTag(m)===filterTag);
        for(const m of filtMovs)
          items.push({type:'mov',w,m,sortKey:sortMode==='alpha'?m.name:movRecency(m)});
      } else {
        if(filterTag!=='All'&&wTag!==filterTag) continue;
        items.push({type:'work',w,sortKey:sortMode==='alpha'?w.title:workRecency(w.id)});
      }
    }
    if(sortMode==='alpha') items.sort((a,b)=>a.sortKey.localeCompare(b.sortKey));
    else items.sort((a,b)=>b.sortKey-a.sortKey);
    for(const item of items) {
      if(item.type==='mov') list.appendChild(movRow(item.m,item.w));
      else list.appendChild(workRow(item.w));
    }
  }

  buildList();
  screen.appendChild(header);
  screen.appendChild(list);
  screen.appendChild(btn({className:'fab',style:{bottom:'80px'},onClick:()=>workDialog(null,async(comp,title)=>{
    const cId=await getOrCreateComposer(comp);
    const id=await dbPut('works',{composerId:cId,title,tag:'Inactive',lastWorked:Date.now()});
    applyMutations([{type:'put',store:'works',record:{id,composerId:cId,title,tag:'Inactive',lastWorked:Date.now()}}],[id]);
  })},'+'));
  screen.appendChild(bottomNav('home'));
  return screen;
}

// ─── EXERCISE DIALOG ─────────────────────────────────────────────────────────
function exerciseDialog(existing, onSave, onDelete) {
  let name=existing?.name||'', notes=existing?.notes||'';
  const nameInp=inp({value:name,placeholder:'e.g. Hanon No. 1, Scales in C major',
    style:{fontSize:'15px',padding:'9px 12px',border:'1.5px solid #E4E3DE',borderRadius:'7px',
      background:'#fff',color:'#2E2E2E',outline:'none',width:'100%'}});
  nameInp.addEventListener('input',()=>name=nameInp.value);
  nameInp.addEventListener('focus',()=>nameInp.style.borderColor='var(--accent)');
  nameInp.addEventListener('blur',()=>nameInp.style.borderColor='#E4E3DE');
  const ta=el('textarea',{placeholder:'Notes (optional)',rows:'3',
    style:{fontSize:'14px',padding:'9px 12px',border:'1.5px solid #E4E3DE',borderRadius:'7px',
      background:'#fff',color:'#2E2E2E',outline:'none',width:'100%',resize:'none',
      lineHeight:'1.5',fontFamily:'inherit'}});
  ta.value=notes;
  ta.addEventListener('input',()=>notes=ta.value);
  ta.addEventListener('focus',()=>ta.style.borderColor='var(--accent)');
  ta.addEventListener('blur',()=>ta.style.borderColor='#E4E3DE');
  const err=span({style:{fontSize:'12px',color:'#BB5050',display:'none'}});
  const body=div({style:{display:'flex',flexDirection:'column',gap:'12px'}},
    div({className:'field'},el('label',{},'Name'),nameInp),
    div({className:'field'},el('label',{},'Notes'),ta),
    err
  );
  const delBtn=existing?btn({className:'btn',style:{color:'#BB5050',marginRight:'auto'},
    onClick:async()=>{
      if(!confirm('Delete this exercise and all its sessions?')) return;
      m.remove(); onDelete&&onDelete();
    }},'Delete'):null;
  const foot=div({style:{display:'flex',gap:'8px',alignItems:'center'}},
    delBtn,
    btn({className:'btn',onClick:()=>m.remove()},'Cancel'),
    btn({className:'btn-primary',onClick:()=>{
      if(!name.trim()){err.textContent='Name required';err.style.display='';return;}
      m.remove(); onSave(name.trim(),notes.trim());
    }},existing?'Save':'Add')
  );
  const m=modal(existing?'Edit Exercise':'New Exercise',body,foot,()=>m.remove());
  setTimeout(()=>nameInp.focus(),50);
}

// ─── EXERCISE DETAIL SCREEN ──────────────────────────────────────────────────
function renderExerciseScreen() {
  const {exerciseId}=NAV;
  const screen=div({className:'screen'});

  async function loadAndRender() {
    const exs=await dbAllExercises();
    const ex=exs.find(e=>e.id===exerciseId);
    if (!ex){navigate({screen:'exercises'});return;}

    screen.innerHTML='';
    const topbar=div({className:'topbar'},
      btn({className:'btn-back',onClick:()=>navigate({screen:'exercises'})},'\u2039'),
      span({style:{fontSize:'18px',flex:'1',color:'#2E2E2E',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},ex.name),
      btn({className:'btn-icon',onClick:()=>exerciseDialog(ex,async(name,notes)=>{
        await dbPut('exercises',{...ex,name,notes});
        loadAndRender();
      },async()=>{
        // Delete exercise + sessions
        const ss=await dbSessionsBySubject(exerciseId,'exercise');
        for(const s of ss) await dbDel('sessions',s.id);
        await dbDel('exercises',exerciseId);
        navigate({screen:'exercises'});
      })},'\u22ef')
    );

    const timerBlock=makeTimerBlock(exerciseId,'exercise',s=>{sessionLog.onSessionAdded(s);});
    const metro=makeMetronomeBlock(ex,'exercises');
    const sessionLog=makeSessionLog(exerciseId,'exercise');

    // Timer row with metronome toggle on right
    const timerRow=div({style:{display:'flex',alignItems:'center',justifyContent:'space-between',alignItems:'flex-start',gap:'8px'}},
      div({style:{flex:'1'}},timerBlock),
      div({style:{paddingTop:'12px'}},metro.toggleBtn)
    );

    const notesContent=ex.notes?div({style:{background:'#EFEEE9',borderRadius:'9px',padding:'11px 13px',marginBottom:'18px',fontSize:'14px',color:'#4A4A4A',lineHeight:'1.6',whiteSpace:'pre-wrap'}},ex.notes):null;

    const content=div({className:'section-content'},
      timerRow,
      metro.el,
      sessionLog.el,
      notesContent
    );

    screen.appendChild(topbar);
    screen.appendChild(content);
    // No bottom nav — back button returns to exercises
  }
  loadAndRender();
  return screen;
}

// ─── STATS HELPERS ────────────────────────────────────────────────────────────
function getMondayOf(d) {
  const day=new Date(d); day.setHours(0,0,0,0);
  const dow=day.getDay(); // 0=Sun
  const diff=(dow===0?-6:1-dow);
  day.setDate(day.getDate()+diff);
  return day;
}
function periodBounds(period, offset=0) {
  const now=new Date();
  if (period==='day') {
    const d=new Date(now); d.setDate(d.getDate()-offset); d.setHours(0,0,0,0);
    const e=new Date(d); e.setDate(d.getDate()+1);
    return [d.getTime(),e.getTime(), fmtDateFull(d)];
  }
  if (period==='week') {
    const mon=getMondayOf(now); mon.setDate(mon.getDate()-offset*7);
    const sun=new Date(mon); sun.setDate(mon.getDate()+7);
    const label=fmtDateFull(mon)+' – '+fmtDateFull(new Date(sun.getTime()-1));
    return [mon.getTime(),sun.getTime(),label];
  }
  if (period==='month') {
    const d=new Date(now.getFullYear(),now.getMonth()-offset,1);
    const e=new Date(d.getFullYear(),d.getMonth()+1,1);
    const label=d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    return [d.getTime(),e.getTime(),label];
  }
  if (period==='year') {
    const y=now.getFullYear()-offset;
    return [new Date(y,0,1).getTime(),new Date(y+1,0,1).getTime(),String(y)];
  }
}
function fmtDateFull(d) {
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

// ─── STATS SCREEN ────────────────────────────────────────────────────────────
function renderStatsScreen() {
  const screen=div({className:'screen'});
  screen.appendChild(div({className:'topbar'},
    span({style:{fontSize:'19px',flex:'1',color:'#2E2E2E'}},'Stats')
  ));

  const periods=['day','week','month','year'];
  const periodLabels={day:'Day',week:'Week',month:'Month',year:'Year'};
  let activePeriod='week', offset=0;

  const periodBar=div({className:'stats-period-bar'});
  const content=div({className:'scroll',style:{padding:'0 16px 32px'}});

  function buildPeriodBar() {
    periodBar.innerHTML='';
    for (const p of periods) {
      const b=btn({className:'pill'+(activePeriod===p?' active':''),onClick:()=>{activePeriod=p;offset=0;buildContent();}},periodLabels[p]);
      periodBar.appendChild(b);
    }
  }

  // Returns array of {label, start, end} sub-buckets for a period
  function getSubBuckets(period, start, end) {
    const buckets=[];
    if (period==='week') {
      // Each day Mon–Sun
      const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      let cur=new Date(start);
      for (let i=0;i<7;i++) {
        const s=cur.getTime();
        const next=new Date(cur); next.setDate(cur.getDate()+1);
        const label=days[i]+' '+cur.getDate()+' '+cur.toLocaleDateString('en-GB',{month:'short'});
        buckets.push({label,start:s,end:next.getTime()});
        cur=next;
      }
    } else if (period==='month') {
      // Full Mon–Sun weeks that contain at least one day in the month.
      // We start from the Monday on or before the 1st, then advance by 7 days.
      // Each bucket spans a full Mon–Sun week (may extend slightly outside the month).
      const monthStart=new Date(start); // 1st of month, 00:00
      const monthEnd=new Date(end);     // 1st of next month, 00:00
      let cur=getMondayOf(new Date(monthStart)); // Monday on or before 1st
      while (cur.getTime()<monthEnd.getTime()) {
        const wMon=cur.getTime();
        const wSun=wMon+7*86400000; // exclusive end (Monday of next week)
        const wMonD=new Date(wMon);
        const wSunD=new Date(wMon+6*86400000); // Sunday = Monday + 6 days (unambiguous)
        const label=fmtDateFull(wMonD)+' – '+fmtDateFull(wSunD);
        // Use full week bounds (not clipped to month) so date comparisons don't overlap
        buckets.push({label,start:wMon,end:wSun});
        cur=new Date(wSun);
      }
    } else if (period==='year') {
      // Each calendar month
      const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const startD=new Date(start);
      const y=startD.getFullYear();
      for (let mo=0;mo<12;mo++) {
        const s=new Date(y,mo,1).getTime();
        const e=new Date(y,mo+1,1).getTime();
        buckets.push({label:months[mo],start:s,end:e});
      }
    }
    return buckets;
  }

  async function buildContent() {
    buildPeriodBar();
    content.innerHTML='';
    const [start,end,label]=periodBounds(activePeriod,offset);
    // Convert ms bounds to ISO date strings for the range index query
    const startDate=localDateStr(start);
    const endDate=localDateStr(end-1); // inclusive end date
    // Fetch only aggregated daily rows in range — O(days) not O(sessions)
    const dailyRows=await dbDailyTotalsRange(startDate, localDateStr(end));
    const totalMs=dailyRows.reduce((s,x)=>s+x.durationMs,0);

    // Nav row
    content.appendChild(div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',margin:'4px 0 0'}},
      btn({className:'btn',style:{padding:'4px 10px'},onClick:()=>{offset++;buildContent();}},'‹ Prev'),
      span({style:{fontSize:'13px',color:'#6B6B6B',textAlign:'center',flex:'1'}},label),
      offset>0?btn({className:'btn',style:{padding:'4px 10px'},onClick:()=>{offset--;buildContent();}},'Next ›'):div({style:{width:'80px'}})
    ));

    content.appendChild(div({className:'stats-big'},fmtDurationHM(totalMs)));
    content.appendChild(div({className:'stats-big-label'},'Total practice time'));

    if (!dailyRows.length) {
      content.appendChild(para({style:{color:'#9E9E9E',fontSize:'14px',textAlign:'center',marginTop:'8px'}},'No sessions in this period.'));
      return;
    }

    // Sub-period breakdown (week→days, month→weeks, year→months)
    // dailyRows have .date (YYYY-MM-DD), so bucket membership is a string comparison
    if (activePeriod!=='day') {
      const buckets=getSubBuckets(activePeriod,start,end);
      content.appendChild(span({className:'label',style:{display:'block',marginTop:'18px',marginBottom:'8px'}},
        activePeriod==='week'?'By Day':activePeriod==='month'?'By Week':'By Month'));
      const grid=div({style:{background:'var(--bg2)',borderRadius:'10px',padding:'0 14px'}});
      for (const b of buckets) {
        const bStartDate=localDateStr(b.start);
        const bEndDate=localDateStr(b.end);
        const bMs=dailyRows.filter(r=>r.date>=bStartDate&&r.date<bEndDate).reduce((s,x)=>s+x.durationMs,0);
        grid.appendChild(div({className:'stats-breakdown-row'},
          span({style:{fontSize:'14px',color:bMs>0?'var(--text)':'#BDBDBD'}},b.label),
          span({style:{fontSize:'14px',color:bMs>0?'var(--sub)':'#BDBDBD',flexShrink:'0',marginLeft:'12px'}},bMs>0?fmtDurationHM(bMs):'—')
        ));
      }
      content.appendChild(grid);
    }

    // Breakdown by subject — aggregate dailyRows by subjectId
    const bySubject=new Map();
    for (const r of dailyRows) {
      if (!bySubject.has(r.subjectId)) bySubject.set(r.subjectId,{ms:0,type:r.subjectType,days:0});
      bySubject.get(r.subjectId).ms+=r.durationMs;
      bySubject.get(r.subjectId).days++;
    }
    const exs=await dbAllExercises();
    const exById=new Map(exs.map(e=>[e.id,e]));
    const rows=[];
    for (const [subjectId,data] of bySubject) {
      let name='Unknown', subLabel='';
      if (data.type==='movement') {
        const mov=IDX.movById.get(subjectId);
        const work=mov?IDX.workById.get(mov.workId):null;
        const comp=work?IDX.composerById.get(work.composerId):null;
        name=mov?.name||'Unknown movement';
        subLabel=(work?.title||'')+(comp?' · '+comp.name:'');
      } else {
        const ex=exById.get(subjectId);
        name=ex?.name||'Unknown exercise';
        subLabel='Exercise';
      }
      rows.push({name,subLabel,ms:data.ms,days:data.days});
    }
    rows.sort((a,b)=>b.ms-a.ms);

    content.appendChild(span({className:'label',style:{display:'block',marginTop:'18px',marginBottom:'8px'}},'Breakdown'));
    const breakdown=div({style:{background:'var(--bg2)',borderRadius:'10px',padding:'0 14px'}});
    for (const r of rows) {
      breakdown.appendChild(div({className:'stats-breakdown-row'},
        div({style:{flex:'1',minWidth:'0'}},
          div({style:{fontSize:'14px',color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},r.name),
          r.subLabel?div({style:{fontSize:'12px',color:'var(--muted)'}},(r.subLabel)+(r.days>1?' · '+r.days+' days':'')):null
        ),
        span({style:{fontSize:'14px',color:'var(--sub)',flexShrink:'0',marginLeft:'12px'}},fmtDurationHM(r.ms))
      ));
    }
    content.appendChild(breakdown);
  }

  buildContent();
  screen.appendChild(periodBar);
  screen.appendChild(content);
  screen.appendChild(bottomNav('stats'));
  return screen;
}

function render() {
  const app=document.getElementById('app');
  app.innerHTML='';
  let screen;
  if      (NAV.screen==='home')      screen=renderHomeScreen();
  else if (NAV.screen==='composer')  screen=renderComposerScreen();
  else if (NAV.screen==='work')      screen=renderWorkScreen();
  else if (NAV.screen==='exercises') screen=renderExercisesScreen();
  else if (NAV.screen==='exercise')  screen=renderExerciseScreen();
  else if (NAV.screen==='stats')     screen=renderStatsScreen();
  if (screen) app.appendChild(screen);
}
(async()=>{
  // Apply stored theme immediately
  const storedTheme = localStorage.getItem('repertoire_theme');
  const themeBgs = {'sans':'#F6F7FB','rubik':'#F6F7FB','clarendon':'#F5F3EE'};
  if (storedTheme && storedTheme !== 'serif') {
    document.body.classList.add('theme-'+storedTheme);
    document.getElementById('theme-color-meta').content = themeBgs[storedTheme] || '#F5F4F0';
  }
  document.getElementById('app').innerHTML='<div style="height:100dvh;display:flex;align-items:center;justify-content:center;color:#9E9E9E;">Loading\u2026</div>';
  await reload();
})();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
