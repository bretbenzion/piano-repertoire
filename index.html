<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#F5F4F0" id="theme-color-meta"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Repertoire"/>
<title>Repertoire</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rubik:wght@400;500;600;700&family=Zilla+Slab:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script>(function(){var t=localStorage.getItem('repertoire_theme');var apply=function(cls){document.body?document.body.classList.add(cls):document.addEventListener('DOMContentLoaded',function(){document.body.classList.add(cls);});};if(t==='sans')apply('theme-sans');else if(t==='rubik')apply('theme-rubik');else if(t==='clarendon')apply('theme-clarendon');})();</script>
<style>
/* ─── THEME ─────────────────────────────────────────────────────────────── */
:root{
  --bg:#F5F4F0;--bg2:#EFEEE9;--border:#E4E3DE;--text:#2E2E2E;--sub:#6B6B6B;
  --muted:#9E9E9E;--accent:#7B9E87;--font:Georgia,"Times New Roman",serif;
  --radius:7px;--card-radius:10px;
}
body.theme-sans{
  --bg:#F6F7FB;--bg2:#EAECF4;--border:#D0D5E8;--text:#0F1523;--sub:#3D4A6B;
  --muted:#8892B0;--accent:#2255CC;--font:'Inter',system-ui,sans-serif;
  --radius:10px;--card-radius:14px;
}
body.theme-dark{
  --bg:#0D0F14;--bg2:#161A24;--border:#252B3B;--text:#E8EDFB;--sub:#7B8DB0;
  --muted:#4A5568;--accent:#4D8EFF;--font:'Inter',system-ui,sans-serif;
  --radius:10px;--card-radius:14px;
}
body.theme-rubik{
  --bg:#F6F7FB;--bg2:#EAECF4;--border:#D0D5E8;--text:#0F1523;--sub:#3D4A6B;
  --muted:#8892B0;--accent:#2B6ED4;--font:'Rubik',system-ui,sans-serif;
  --radius:10px;--card-radius:14px;
}
body.theme-clarendon{
  --bg:#F5F3EE;--bg2:#EDEAE3;--border:#DDD9D0;--text:#1E1A14;--sub:#5C5040;
  --muted:#9E9080;--accent:#8B4513;--font:Clarendon,'Zilla Slab',Georgia,serif;
  --radius:7px;--card-radius:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overscroll-behavior:none}
input,button,textarea{font-family:inherit}
button{cursor:pointer}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
.screen{display:flex;flex-direction:column;height:100dvh;background:var(--bg);position:fixed;inset:0;overflow:hidden}
.topbar{display:flex;align-items:center;gap:8px;padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.row{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start}
.row:active{background:var(--bg2)}
.title{font-size:18px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub{font-size:13px;color:var(--sub)}
.label{font-size:11px;letter-spacing:.5px;font-weight:bold;color:var(--sub);text-transform:uppercase}
.small{font-size:12px;color:var(--muted)}
.btn{background:none;border:none;color:var(--accent);font-size:14px;padding:8px 16px;border-radius:var(--radius);font-family:inherit}
.btn-primary{background:var(--accent);color:#fff;border:none;font-size:14px;padding:9px 20px;border-radius:var(--radius);font-family:inherit}
.btn-back{background:none;border:none;font-size:26px;color:var(--accent);padding:0 6px 0 0;line-height:1;flex-shrink:0}
.btn-icon{background:none;border:none;font-size:22px;color:var(--muted);padding:4px 6px;line-height:1}
.btn-plus{background:none;border:none;font-size:26px;color:var(--accent);line-height:1;padding:4px}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:28px;background:var(--accent);color:#fff;border:none;font-size:30px;box-shadow:0 4px 16px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center}
.pill{font-size:12px;padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--sub);white-space:nowrap;flex-shrink:0}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip{font-size:11px;border-radius:4px;padding:2px 7px;display:inline-block}
.card{background:var(--bg2);border-radius:var(--card-radius);padding:14px;margin-bottom:10px}
.pbar{display:flex;height:14px;border-radius:6px;overflow:hidden;width:100%}
.grade-badge{color:#fff;border-radius:6px;padding:5px 10px;font-weight:bold;font-size:14px;min-width:42px;text-align:center;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;background:var(--bg)}
.tab{font-size:13px;padding:10px 16px;white-space:nowrap;background:none;border:none;color:var(--sub);border-bottom:2.5px solid transparent;font-family:inherit}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--bg);border-radius:14px;width:100%;max-width:440px;max-height:90dvh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-head{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:16px 20px 0}
.modal-foot{padding:16px 20px 20px;display:flex;justify-content:flex-end;gap:8px}
.modal-close{background:none;border:none;font-size:24px;color:var(--muted);line-height:1;padding:0 0 0 8px}
.sheet-overlay{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.28)}
.sheet{position:absolute;bottom:0;left:0;right:0;background:var(--bg);border-radius:16px 16px 0 0;padding-bottom:env(safe-area-inset-bottom,16px)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 4px}
.sheet-btn{display:block;width:100%;text-align:left;padding:15px 24px;background:none;border:none;font-size:16px;color:var(--text);font-family:inherit;border-top:1px solid var(--border)}
.sheet-btn:first-of-type{border-top:none}
.sheet-btn.danger{color:#BB5050}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:var(--sub)}
.field input{font-size:15px;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);background:#fff;color:var(--text);outline:none;width:100%}
.field input:focus{border-color:var(--accent)}
.field .err{font-size:12px;color:#BB5050}
.row-fields{display:flex;gap:10px}
.grade-grid{display:flex;flex-direction:column;gap:5px}
.grade-row{display:flex;gap:5px}
.grade-btn{flex:1;padding:10px 0;border:none;border-radius:var(--radius);font-size:14px;font-family:inherit}
.warn{background:#FFF3CD;border:1px solid #F0CC60;border-radius:9px;padding:14px}
.warn-title{font-size:14px;font-weight:bold;color:#7A5C00;margin-bottom:6px}
.warn-body{font-size:13px;color:#7A5C00;margin-bottom:12px;line-height:1.5}
.warn-btns{display:flex;gap:8px}
.warn-cancel{flex:1;padding:9px 0;background:none;border:1px solid #ccc;border-radius:var(--radius);font-size:14px;font-family:inherit}
.warn-ok{flex:1;padding:9px 0;background:#BB5050;color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:bold;font-family:inherit}
.infobox{margin-top:20px;padding:12px 14px;background:var(--bg2);border-radius:9px;border:1px solid var(--border)}
.infobox-title{font-size:12px;font-weight:bold;color:var(--sub);margin-bottom:4px}
.infobox-body{font-size:12px;color:var(--sub);line-height:1.6}
.status-ok{font-size:13px;margin-top:14px;padding:10px 14px;border-radius:8px;background:#E8F5E9;color:#2E7D32}
.status-err{font-size:13px;margin-top:14px;padding:10px 14px;border-radius:8px;background:#FDECEA;color:#BB5050}
.empty{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px}
.empty p{color:var(--muted);text-align:center;line-height:1.8}
.section-content{padding:16px 16px 100px;overflow-y:auto;flex:1}
.notes-block{background:var(--bg2);border-radius:9px;padding:11px 13px;margin-bottom:18px;font-size:14px;color:var(--text);line-height:1.6;white-space:pre-wrap}
.notes-toggle{background:none;border:none;font-size:13px;color:var(--muted);padding:0;font-family:inherit;cursor:pointer;text-align:left}
.reorder-btn{background:none;border:none;font-size:18px;color:#BDBDBD;padding:2px 4px;line-height:1;font-family:inherit}
.reorder-btn:active{color:var(--accent)}
.ai-box{border-radius:9px;padding:13px 14px;margin-bottom:18px;background:#EEF3FF;border:1px solid #C5D3F0;font-size:14px;color:var(--text);line-height:1.7}
.ai-box-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ai-section-title{font-size:11px;letter-spacing:.5px;font-weight:bold;color:#5B6FA8;text-transform:uppercase;margin-top:10px;margin-bottom:3px}
.date-label{font-size:11px;color:#BDBDBD}
/* Search — icon shows inline in topbar; bar slides open */
.search-wrap{display:flex;align-items:center;gap:6px;overflow:hidden;transition:width .2s}
.search-inp{font-size:15px;padding:6px 10px;border:1.5px solid var(--border);border-radius:var(--radius);background:#fff;color:var(--text);outline:none;font-family:inherit;width:180px}
.search-inp:focus{border-color:var(--accent)}
/* Small inline timer in movement header */
.timer-inline{display:flex;align-items:center;gap:8px}
.timer-inline-display{font-size:16px;font-variant-numeric:tabular-nums;color:var(--text);min-width:52px}
.timer-inline-btn{border:none;border-radius:6px;padding:4px 12px;font-size:13px;font-family:inherit;cursor:pointer}
.timer-inline-start{background:var(--accent);color:#fff}
.timer-inline-stop{background:#BB5050;color:#fff}
/* Full timer block for exercises */
.timer-block{background:var(--bg2);border-radius:12px;padding:14px 16px;margin-bottom:18px;display:flex;align-items:center;gap:12px}
.timer-display{font-size:28px;font-variant-numeric:tabular-nums;color:var(--text);letter-spacing:1px;flex:1}
.timer-btn{border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-family:inherit;cursor:pointer}
.timer-btn-start{background:var(--accent);color:#fff}
.timer-btn-stop{background:#BB5050;color:#fff}
.timer-btn-log{background:#4A87CC;color:#fff}
.session-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.session-row:last-child{border-bottom:none}
.bottom-nav{display:flex;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;background:none;border:none;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;cursor:pointer}
.nav-btn-label{font-size:13px;color:var(--muted)}
.nav-btn.active .nav-btn-label{color:var(--accent)}
.stats-period-bar{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;flex-shrink:0}
.stats-big{font-size:42px;font-weight:bold;color:var(--text);text-align:center;padding:24px 0 4px}
.stats-big-label{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px}
.stats-breakdown-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);font-size:14px}
.stats-breakdown-row:last-child{border-bottom:none}
.ex-row{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.ex-row:active{background:var(--bg2)}
/* Metronome */
.metro-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.metro-toggle{background:none;border:none;padding:2px 4px;color:var(--muted);cursor:pointer;line-height:1;flex-shrink:0;opacity:.7}
.metro-toggle.active{color:var(--accent);opacity:1}
.metro-panel{background:var(--bg2);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;flex-direction:column;gap:10px}
.metro-bpm-row{display:flex;align-items:center;gap:0;justify-content:center}
.metro-bpm-adj{width:32px;height:32px;border-radius:50%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;user-select:none}
.metro-bpm-adj:active{background:var(--border)}
.metro-bpm-val{font-size:32px;font-variant-numeric:tabular-nums;color:var(--text);min-width:90px;text-align:center}
.metro-bpm-val input{width:90px;font-size:32px;font-family:var(--font);background:transparent;border:none;outline:none;color:var(--accent);text-align:center;-moz-appearance:textfield}
.metro-bpm-val input::-webkit-outer-spin-button,.metro-bpm-val input::-webkit-inner-spin-button{-webkit-appearance:none}
.metro-bpm-label{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;text-align:center}
.metro-presets{display:flex;gap:6px;justify-content:center}
.metro-preset{flex:1;padding:5px 0;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);color:var(--muted);font-size:13px;font-family:var(--font);cursor:pointer;transition:all .12s}
.metro-preset.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:bold}
.metro-settings-row{display:flex;gap:16px;justify-content:center}
.metro-setting{display:flex;flex-direction:column;align-items:center;gap:5px}
.metro-setting-label{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.metro-opts{display:flex;gap:4px}
.metro-opt{width:30px;height:26px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--muted);font-size:12px;font-family:var(--font);cursor:pointer;transition:all .12s}
.metro-opt.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:bold}
.metro-pulses{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:6px;min-height:16px}
.metro-pulse-group{display:flex;gap:4px;align-items:center}
.metro-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background .04s,transform .04s;flex-shrink:0}
.metro-dot.flash-down{background:#C8A030;transform:scale(1.5)}
.metro-dot.flash-beat{background:var(--accent);transform:scale(1.3)}
.metro-dot.flash-sub{background:var(--sub);transform:scale(1.1)}
.metro-beat-sep{width:1px;height:10px;background:var(--border);flex-shrink:0;margin:0 1px}
.metro-play{border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;flex-shrink:0;transition:background .1s}
.metro-play.stopped{background:var(--accent);color:#fff}
.metro-play.running{background:#BB5050;color:#fff}
.metro-tap{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:4px 10px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:var(--font);cursor:pointer}
.metro-tap:active{border-color:var(--accent);color:var(--accent)}
.metro-bottom-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
</style>
</head>

<div id="app"></div>
<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const GRADES = ['AA','A','A-','B+','B','B-','C+','C','C-','D','E'];
const GRADE_MASTERY = {'AA':1,'A':1,'A-':.9,'B+':0.85,'B':.75,'B-':.65,'C+':0.55,'C':.5,'C-':.4,'D':.25,'E':0};
const GRADE_COLOR_SERIF = {
  'AA':'#1A237E','A':'#1B5E20','A-':'#2E7D32',
  'B+':'#43A047','B':'#66BB6A','B-':'#A5D6A7',
  'C+':'#F9C200','C':'#F9A800','C-':'#F47B00',
  'D':'#E53935','E':'#BDBDBD'
};
const GRADE_COLOR_SANS = {
  'AA':'#1744B0','A':'#0E7A34','A-':'#1E9040',
  'B+':'#2FA84E','B':'#3DB85A','B-':'#7DC990',
  'C+':'#E8B400','C':'#E89800','C-':'#E06000',
  'D':'#D93020','E':'#B0B4BC'
};

function gradeColor(grade) {
  if (document.body.classList.contains('theme-sans') ||
      document.body.classList.contains('theme-rubik')) return GRADE_COLOR_SANS[grade]||'#C8CDD8';
  return GRADE_COLOR_SERIF[grade]||'#CCCCC8';
}
const GRADE_COLOR = new Proxy({}, { get: (_,g) => gradeColor(g) });
const GRADE_DESC = {
  'AA':'Performance tempo or beyond. Artistically complete — phrasing, tone color, pedaling, and musical personality fully realized. Exceeds the technical requirements of the piece. Reserved for sections you would perform confidently in public.',
  'A':'Full performance tempo. All notated details present and consistent — dynamics, articulation, ornamentation. Reliable under pressure. The target end state for most sections.',
  'A-':'Performance tempo or very close. All details present but occasional lapses in consistency or confidence. Nearly performance-ready; needs consolidation.',
  'B+':'At least 3/4 performance tempo or above. Basic dynamics and articulation in place, ornamentation added. Musically shaped, not just mechanically correct.',
  'B':'3/4 performance tempo. Hands together, ornamentation added, basic dynamics and articulation present. Solid and reliable at this tempo.',
  'B-':'3/4 performance tempo or very close. Hands together, notes clean and reliable at this tempo. Ornamentation and dynamics not yet required. Natural plateau for pieces not being taken further.',
  'C+':'Half performance tempo or above. Hands together, notes mostly secure. Beginning to feel musical rather than mechanical.',
  'C':'Half performance tempo. Hands together. Notes learned but concentration required to maintain accuracy.',
  'C-':'Half performance tempo or very close. Hands together but may be unsteady. Notes mostly learned with some gaps or hesitations.',
  'D':'Hands separate or very halting hands together. Notes partially learned. Active note-learning phase.',
  'E':'Placeholder. Section marked out but not yet begun.'
};
const TAGS = ['Current','Learned','Finished','Inactive'];
const TAG_COLOR = {Current:'#7B9E87', Learned:'#5B8DB8', Finished:'#B8960C', Inactive:'#9E9E9E'};
const TAG_AUTO = new Set(['Learned','Finished']); // auto-computed, not manually set
const MANUAL_TAGS = ['Current','Inactive']; // tags user can manually assign

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
// Always use local calendar date, not UTC, to avoid timezone-shift bugs
function localDateStr(ts) {
  const d = new Date(ts);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const sameYear = d.getFullYear() === now.getFullYear();
  return months[d.getMonth()] + ' ' + d.getDate() + (sameYear ? '' : ' ' + d.getFullYear());
}

// ─── TIMER ────────────────────────────────────────────────────────────────────
// Uses a Web Worker for better background reliability on Android.
// Falls back to wall-clock arithmetic so the final duration is always correct
// even if the worker was suspended.
function createTimerWorker(onTick) {
  const src=`let iv=null;self.onmessage=e=>{if(e.data==='start'){iv=setInterval(()=>self.postMessage('tick'),1000);}else{clearInterval(iv);}};`;
  const url=URL.createObjectURL(new Blob([src],{type:'application/javascript'}));
  const w=new Worker(url);
  w.onmessage=()=>onTick();
  w._url=url;
  return w;
}

function fmtDuration(ms) {
  if (!ms||ms<0) return '0:00';
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  if (h>0) return h+':'+(m%60).toString().padStart(2,'0')+':'+(s%60).toString().padStart(2,'0');
  return m+':'+(s%60).toString().padStart(2,'0');
}

function fmtDurationLong(ms) {
  if (!ms||ms<0) return '0s';
  const totalSec=Math.round(ms/1000);
  const h=Math.floor(totalSec/3600), m=Math.floor((totalSec%3600)/60), s=totalSec%60;
  if (h>0) return h+'h '+(m>0?m+'m ':'')+(s>0?s+'s':'');
  if (m>0) return m+'m'+(s>0?' '+s+'s':'');
  return s+'s';
}
// Stats display: hours & minutes only, no seconds
function fmtDurationHM(ms) {
  if (!ms||ms<0) return '0m';
  const totalMin=Math.round(ms/60000);
  const h=Math.floor(totalMin/60), m=totalMin%60;
  if (h>0) return h+'h'+(m>0?' '+m+'m':'');
  return m+'m';
}
const getApiKey = () => localStorage.getItem('repertoire_api_key')||'';
const setApiKey = v => localStorage.setItem('repertoire_api_key', v);

// ─── AI SUMMARIES (cached in IndexedDB key-value store) ───────────────────────
// Stored as summaries:<movementId> → {text, generatedAt}
async function getSummary(key) {
  return new Promise((res)=>{
    const tx=_db.transaction('summaries','readonly');
    const r=tx.objectStore('summaries').get(key);
    r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null);
  });
}

// ─── DATABASE ─────────────────────────────────────────────────────────────────
let _db = null;
function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res,rej) => {
    const r = indexedDB.open('piano_repertoire',4);
    r.onupgradeneeded = e => {
      const db = e.target.result;
      const tx = e.target.transaction; // use existing upgrade transaction
      const mk = (n,idx) => {
        if (!db.objectStoreNames.contains(n)) {
          const s = db.createObjectStore(n,{keyPath:'id',autoIncrement:true});
          if (idx) s.createIndex(idx,idx);
        }
      };
      mk('composers'); mk('works','composerId'); mk('movements','workId'); mk('sections','movementId');
      if (!db.objectStoreNames.contains('summaries'))
        db.createObjectStore('summaries',{keyPath:'id'});
      if (!db.objectStoreNames.contains('sessions')) {
        const ss=db.createObjectStore('sessions',{keyPath:'id',autoIncrement:true});
        ss.createIndex('subjectId','subjectId');
      }
      if (!db.objectStoreNames.contains('exercises'))
        db.createObjectStore('exercises',{keyPath:'id',autoIncrement:true});
      // v4: dailyTotals — pre-aggregated per (date, subjectId) for O(1) stats
      // key: "YYYY-MM-DD:subjectId", value: {id, date, subjectId, subjectType, durationMs}
      if (!db.objectStoreNames.contains('dailyTotals')) {
        const dt=db.createObjectStore('dailyTotals',{keyPath:'id'}); // id = date+':'+subjectId
        dt.createIndex('date','date');
      }
      // Backfill dailyTotals from existing sessions on upgrade
      if (e.oldVersion < 4 && db.objectStoreNames.contains('sessions')) {
        const sesStore=tx.objectStore('sessions');
        const dtStore=tx.objectStore('dailyTotals');
        sesStore.getAll().onsuccess=ev=>{
          const sessions=ev.target.result||[];
          const acc=new Map();
          for (const s of sessions) {
            const date=localDateStr(s.timestamp);
            const key=date+':'+s.subjectId;
            if (!acc.has(key)) acc.set(key,{id:key,date,subjectId:s.subjectId,subjectType:s.subjectType,durationMs:0});
            acc.get(key).durationMs+=s.durationMs;
          }
          for (const rec of acc.values()) dtStore.put(rec);
        };
      }
    };
    r.onsuccess = e => { _db = e.target.result; res(_db); };
    r.onerror   = () => rej(r.error);
  });
}
const dbAll = store => new Promise((res,rej) => {
  const r = _db.transaction(store,'readonly').objectStore(store).getAll();
  r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
});
const dbPut = (store,obj) => new Promise((res,rej) => {
  const r = _db.transaction(store,'readwrite').objectStore(store).put(obj);
  r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
});
const dbDel = (store,id) => new Promise((res,rej) => {
  const r = _db.transaction(store,'readwrite').objectStore(store).delete(id);
  r.onsuccess = () => res(); r.onerror = () => rej(r.error);
});

async function upsertDailyTotal(date, subjectId, subjectType, deltaMs) {
  const key=dtKey(date,subjectId);
  const existing=await new Promise((res)=>{
    const r=_db.transaction('dailyTotals','readonly').objectStore('dailyTotals').get(key);
    r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null);
  });
  const rec={id:key,date,subjectId,subjectType,durationMs:(existing?.durationMs||0)+deltaMs};
  await dbPut('dailyTotals',rec);
  return rec;
}
async function recomputeDailyTotal(date, subjectId, subjectType) {
  // Re-sum all raw sessions for this subject on this date — called after delete
  const sessions=await dbSessionsBySubject(subjectId,subjectType);
  const dayMs=sessions.filter(s=>localDateStr(s.timestamp)===date)
    .reduce((sum,s)=>sum+s.durationMs,0);
  const key=dtKey(date,subjectId);
  if (dayMs===0) {
    await dbDel('dailyTotals',key);
  } else {
    await dbPut('dailyTotals',{id:key,date,subjectId,subjectType,durationMs:dayMs});
  }
}

const pct = v => (v*100).toFixed(1)+'%';

// ─── INDEXED STATE ────────────────────────────────────────────────────────────
// Built once after loadAll(); updated in-place by mutate(). Never re-scanned.
// composerById : Map<id, composer>
// workById     : Map<id, work>
// movById      : Map<id, movement>
// secById      : Map<id, section>
// movsByWork   : Map<workId, movement[]>   — sorted by orderIndex
// secsByMov    : Map<movId,  section[]>    — unsorted (sorted on demand)
// MASTERY      : Map<workId, float>        — cached, equal-weight per movement
let IDX = {};

function buildIndex(raw) {
  const composerById = new Map(raw.composers.map(c=>[c.id,c]));
  const workById     = new Map(raw.works.map(w=>[w.id,w]));
  const movById      = new Map(raw.movements.map(m=>[m.id,m]));
  const secById      = new Map(raw.sections.map(s=>[s.id,s]));

  const movsByWork = new Map();
  for (const m of raw.movements) {
    if (!movsByWork.has(m.workId)) movsByWork.set(m.workId,[]);
    movsByWork.get(m.workId).push(m);
  }
  for (const [,arr] of movsByWork) arr.sort((a,b)=>a.orderIndex-b.orderIndex);

  const secsByMov = new Map();
  for (const s of raw.sections) {
    if (!secsByMov.has(s.movementId)) secsByMov.set(s.movementId,[]);
    secsByMov.get(s.movementId).push(s);
  }

  const composerPos = new Map(raw.composers.map((c,i)=>[c.id,i]));
  const workPos     = new Map(raw.works.map((w,i)=>[w.id,i]));
  const movPos      = new Map(raw.movements.map((m,i)=>[m.id,i]));
  const secPos      = new Map(raw.sections.map((s,i)=>[s.id,i]));
  IDX = {composerById,workById,movById,secById,movsByWork,secsByMov,composerPos,workPos,movPos,secPos};

  // Build mastery cache for all works
  const MASTERY = new Map();
  for (const w of raw.works) MASTERY.set(w.id, _calcWorkMastery(w.id));
  IDX.MASTERY = MASTERY;
}

function _calcMovMastery(mov) {
  const total = mov.totalMeasures||0; if (!total) return 0;
  const secs  = IDX.secsByMov.get(mov.id)||[];
  return secs.reduce((sum,s)=>{
    const n = Math.max(0,Math.min(s.endMeasure,total)-s.startMeasure+1);
    return sum + n*(GRADE_MASTERY[s.grade]||0);
  },0) / total;
}
function _calcWorkMastery(workId) {
  const movs = IDX.movsByWork.get(workId)||[];
  if (!movs.length) return 0;
  return movs.reduce((s,m)=>s+_calcMovMastery(m),0) / movs.length;
}
// Public accessors — always O(1) after index build
function movMastery(mov)    { return _calcMovMastery(mov); }
function workMastery(workId){ return IDX.MASTERY.get(workId)??0; }
function recomputeMastery(workId) { IDX.MASTERY.set(workId,_calcWorkMastery(workId)); }

// ─── AUTO-TAG COMPUTATION ────────────────────────────────────────────────────
// Returns the effective tag for a movement, considering auto-tags first.
function computeMovTag(mov) {
  const secs = IDX.secsByMov.get(mov.id)||[];
  if (!secs.length) return mov.tag||'Inactive';
  // All measures must be sectioned
  const totalSectioned = secs.reduce((s,x)=>s+(x.endMeasure-x.startMeasure+1),0);
  if (totalSectioned < (mov.totalMeasures||0)) return mov.tag||'Inactive';
  // Check grade thresholds
  const allA  = secs.every(s=>GRADE_MASTERY[s.grade]>=GRADE_MASTERY['A']);
  const allB  = secs.every(s=>GRADE_MASTERY[s.grade]>=GRADE_MASTERY['B']);
  if (allA) return 'Finished';
  if (allB) return 'Learned';
  return mov.tag||'Inactive';
}

// Returns shared tag across all movements, or 'mixed'
function computeWorkTag(workId) {
  const movs = IDX.movsByWork.get(workId)||[];
  if (!movs.length) return IDX.workById.get(workId)?.tag||'Inactive';
  const tags = movs.map(m=>computeMovTag(m));
  return tags.every(t=>t===tags[0]) ? tags[0] : 'mixed';
}

// Priority display tag for composer view — no 'mixed', always returns a single tag.
const TAG_PRIORITY = {Current:3, Finished:2, Learned:1, Inactive:0};
function computeWorkDisplayTag(workId) {
  const movs = IDX.movsByWork.get(workId)||[];
  if (!movs.length) return IDX.workById.get(workId)?.tag||'Inactive';
  const tags = movs.map(m=>computeMovTag(m));
  // If any movement is Current → Current
  if (tags.some(t=>t==='Current')) return 'Current';
  // If all movements are Finished → Finished
  if (tags.every(t=>t==='Finished')) return 'Finished';
  // If all movements are Finished or Learned → Learned
  if (tags.every(t=>t==='Finished'||t==='Learned')) return 'Learned';
  // Otherwise (mix of auto-tags + Inactive, or all Inactive) → Inactive
  return 'Inactive';
}

// ─── PARTIAL STATE MUTATION ───────────────────────────────────────────────────
// Call instead of reload() after any DB write. Updates STATE + IDX in-place,
// then re-renders. No full DB round-trip; only the caller's awaited dbPut/dbDel
// results are needed.
//
// ops is an array of {type:'put'|'del', store, record?, id?}
// After applying ops, pass affectedWorkId to recompute mastery for that work only.
function applyMutations(ops, affectedWorkIds=[]) {
  for (const op of ops) {
    if (op.type==='put') {
      const rec = op.record;
      if (op.store==='composers') {
        const isNew=!IDX.composerById.has(rec.id);
        IDX.composerById.set(rec.id,rec);
        if (isNew) { IDX.composerPos.set(rec.id,STATE.composers.length); STATE.composers.push(rec); }
        else STATE.composers[IDX.composerPos.get(rec.id)]=rec;
      } else if (op.store==='works') {
        const isNew=!IDX.workById.has(rec.id);
        IDX.workById.set(rec.id,rec);
        if (isNew) { IDX.workPos.set(rec.id,STATE.works.length); STATE.works.push(rec); }
        else STATE.works[IDX.workPos.get(rec.id)]=rec;
      } else if (op.store==='movements') {
        const old=IDX.movById.get(rec.id);
        const isNew=!old;
        IDX.movById.set(rec.id,rec);
        if (isNew) { IDX.movPos.set(rec.id,STATE.movements.length); STATE.movements.push(rec); }
        else STATE.movements[IDX.movPos.get(rec.id)]=rec;
        if (old && old.workId!==rec.workId) {
          const oldArr=IDX.movsByWork.get(old.workId)||[];
          const oi=oldArr.findIndex(m=>m.id===rec.id);
          if (oi>=0) oldArr.splice(oi,1);
        }
        if (!IDX.movsByWork.has(rec.workId)) IDX.movsByWork.set(rec.workId,[]);
        const arr=IDX.movsByWork.get(rec.workId);
        const ai=arr.findIndex(m=>m.id===rec.id);
        if (ai>=0) arr[ai]=rec; else arr.push(rec);
        arr.sort((a,b)=>a.orderIndex-b.orderIndex);
      } else if (op.store==='sections') {
        const old=IDX.secById.get(rec.id);
        const isNew=!old;
        IDX.secById.set(rec.id,rec);
        if (isNew) { IDX.secPos.set(rec.id,STATE.sections.length); STATE.sections.push(rec); }
        else STATE.sections[IDX.secPos.get(rec.id)]=rec;
        if (old && old.movementId!==rec.movementId) {
          const oldArr=IDX.secsByMov.get(old.movementId)||[];
          const oi=oldArr.findIndex(s=>s.id===rec.id);
          if (oi>=0) oldArr.splice(oi,1);
        }
        if (!IDX.secsByMov.has(rec.movementId)) IDX.secsByMov.set(rec.movementId,[]);
        const arr=IDX.secsByMov.get(rec.movementId);
        const ai=arr.findIndex(s=>s.id===rec.id);
        if (ai>=0) arr[ai]=rec; else arr.push(rec);
      }
    } else if (op.type==='del') {
      if (op.store==='composers') {
        const i=IDX.composerPos.get(op.id);
        IDX.composerById.delete(op.id); IDX.composerPos.delete(op.id);
        if (i!=null) { STATE.composers.splice(i,1); for(let j=i;j<STATE.composers.length;j++) IDX.composerPos.set(STATE.composers[j].id,j); }
      } else if (op.store==='works') {
        const i=IDX.workPos.get(op.id);
        IDX.workById.delete(op.id); IDX.workPos.delete(op.id); IDX.MASTERY.delete(op.id);
        if (i!=null) { STATE.works.splice(i,1); for(let j=i;j<STATE.works.length;j++) IDX.workPos.set(STATE.works[j].id,j); }
      } else if (op.store==='movements') {
        const old=IDX.movById.get(op.id);
        const i=IDX.movPos.get(op.id);
        IDX.movById.delete(op.id); IDX.movPos.delete(op.id);
        if (i!=null) { STATE.movements.splice(i,1); for(let j=i;j<STATE.movements.length;j++) IDX.movPos.set(STATE.movements[j].id,j); }
        if (old) { const arr=IDX.movsByWork.get(old.workId)||[]; const ai=arr.findIndex(m=>m.id===op.id); if(ai>=0) arr.splice(ai,1); }
      } else if (op.store==='sections') {
        const old=IDX.secById.get(op.id);
        const i=IDX.secPos.get(op.id);
        IDX.secById.delete(op.id); IDX.secPos.delete(op.id);
        if (i!=null) { STATE.sections.splice(i,1); for(let j=i;j<STATE.sections.length;j++) IDX.secPos.set(STATE.sections[j].id,j); }
        if (old) { const arr=IDX.secsByMov.get(old.movementId)||[]; const ai=arr.findIndex(s=>s.id===op.id); if(ai>=0) arr.splice(ai,1); }
      }
    }
  }
  const wids = new Set(affectedWorkIds);
  for (const wid of wids) recomputeMastery(wid);
  render();
}

async function exportCSV() {
  const {composers,works,movements,sections} = await loadAll();
  const rows=[['Composer','Work','Tag','Movement','Total Measures','Target BPM','Section','Start','End','Grade','Mastery%']];
  for (const comp of composers) {
    for (const w of works.filter(x=>x.composerId===comp.id)) {
      const wm = movements.filter(m=>m.workId===w.id);
      if (!wm.length){rows.push([comp.name,w.title,w.tag,'','','','','','','','']);continue;}
      for (const m of wm){
        const ms=sections.filter(s=>s.movementId===m.id).sort((a,b)=>a.startMeasure-b.startMeasure);
        const mastPct=pct(movMastery(m,sections));
        if (!ms.length){rows.push([comp.name,w.title,w.tag,m.name,m.totalMeasures,m.targetBpm,'','','','',mastPct]);continue;}
        ms.forEach((s,i)=>rows.push([comp.name,w.title,w.tag,m.name,m.totalMeasures,m.targetBpm,s.name||'Section '+(i+1),s.startMeasure,s.endMeasure,s.grade,mastPct]));
      }
    }
  }
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  dl(new Blob([csv],{type:'text/csv'}),'repertoire-'+today()+'.csv');
}
// Build lastSessionAt map from sessions array — used in import and reload
function buildLastSessionMap(sessions) {
  const map = new Map();
  if (!sessions) return map;
  for (const s of sessions) {
    if (s.subjectType !== 'movement') continue;
    const cur = map.get(s.subjectId) || 0;
    if (s.timestamp > cur) map.set(s.subjectId, s.timestamp);
  }
  return map;
}

async function importJSON(text) {
  let p; try{p=JSON.parse(text);}catch{throw new Error('Invalid JSON');}
  const {composers,works,movements,sections,exercises,sessions,dailyTotals,summaries}=p;
  if(!composers||!works||!movements||!sections) throw new Error('Missing data');
  await openDB();
  // Clear all stores
  for(const store of ['sections','movements','works','composers','exercises','sessions','dailyTotals','summaries']){
    const all=await dbAll(store); for(const i of all) await dbDel(store,i.id);
  }
  for(const i of composers)   await dbPut('composers',i);
  for(const i of works)       await dbPut('works',i);
  // Backfill lastSessionAt from sessions before writing movements
  if(sessions) {
    const lsMap = buildLastSessionMap(sessions);
    for(const m of movements) {
      const ts = lsMap.get(m.id);
      if(ts) m.lastSessionAt = ts;
      else delete m.lastSessionAt;
    }
  }
  for(const i of movements)   await dbPut('movements',i);
  for(const i of sections)    await dbPut('sections',i);
  // v2+ fields — gracefully skip if importing an older backup
  if(exercises)    for(const i of exercises)    await dbPut('exercises',i);
  if(sessions)     for(const i of sessions)     await dbPut('sessions',i);
  if(dailyTotals)  for(const i of dailyTotals)  await dbPut('dailyTotals',i);
  if(summaries)    for(const i of summaries)     await dbPut('summaries',i);
  // If importing a v1 backup (no dailyTotals), rebuild them from sessions
  if(sessions && !dailyTotals) {
    const acc=new Map();
    for(const s of sessions){
      const date=localDateStr(s.timestamp);
      const key=date+':'+s.subjectId;
      if(!acc.has(key)) acc.set(key,{id:key,date,subjectId:s.subjectId,subjectType:s.subjectType,durationMs:0});
      acc.get(key).durationMs+=s.durationMs;
    }
    for(const rec of acc.values()) await dbPut('dailyTotals',rec);
  }
}

// ─── DOM HELPERS ─────────────────────────────────────────────────────────────
function el(tag, props={}, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(props)) {
    if (k==='style' && typeof v==='object') Object.assign(e.style,v);
    else if (k.startsWith('on') && typeof v==='function') e.addEventListener(k.slice(2).toLowerCase(),v);
    else if (k==='className') e.className=v;
    else e.setAttribute(k,v);
  }
  for (const ch of children.flat()) {
    if (ch==null||ch===false) continue;
    e.appendChild(typeof ch==='string'||typeof ch==='number' ? document.createTextNode(String(ch)) : ch);
  }
  return e;
}
const div  = (p,...c) => el('div',p,...c);
const span = (p,...c) => el('span',p,...c);
const btn  = (p,...c) => el('button',p,...c);
const inp  = (p)      => el('input',p);

function gradeBadge(grade) {
  return div({className:'grade-badge',style:{background:GRADE_COLOR[grade]||'#9E9E9E'}}, grade);

function progressBar(totalMeasures, sections) {
  const bar = div({className:'pbar'});
  if (!totalMeasures) { bar.style.background='var(--border)'; return bar; }
  const sorted = [...sections].sort((a,b)=>a.startMeasure-b.startMeasure);
  const segs=[]; let cur=1;
  for (const s of sorted) {
    if (s.startMeasure>cur) segs.push({n:s.startMeasure-cur,color:'var(--border)'});
    segs.push({n:s.endMeasure-s.startMeasure+1,color:GRADE_COLOR[s.grade]});
    cur=s.endMeasure+1;
  }
  if (cur<=totalMeasures) segs.push({n:totalMeasures-cur+1,color:'var(--border)'});
  for (const s of segs) bar.appendChild(div({style:{flex:s.n,background:s.color,height:'100%'}}));
  return bar;
}
function combinedProgressBar(movements, secsByMov) {
  const bar = div({className:'pbar'});
  const total=movements.reduce((s,m)=>s+(m.totalMeasures||0),0);
  if (!total){bar.style.background='var(--border)';return bar;}
  for (const m of movements) {
    const t=m.totalMeasures||0; if(!t) continue;
    const ms=(secsByMov.get?secsByMov.get(m.id):secsByMov.filter(s=>s.movementId===m.id)||[]);
    const sorted=[...(ms||[])].sort((a,b)=>a.startMeasure-b.startMeasure);
    let cur=1;
    for (const s of sorted) {
      if(s.startMeasure>cur) bar.appendChild(div({style:{flex:s.startMeasure-cur,background:'var(--border)',height:'100%'}}));
      bar.appendChild(div({style:{flex:s.endMeasure-s.startMeasure+1,background:GRADE_COLOR[s.grade],height:'100%'}}));
      cur=s.endMeasure+1;
    }
    if(cur<=t) bar.appendChild(div({style:{flex:t-cur+1,background:'var(--border)',height:'100%'}}));
  }
  return bar;
}

function modal(title, bodyEl, footerEl, onClose) {
  const overlay = div({className:'overlay'});
  const m = div({className:'modal'},
    div({className:'modal-head'},
      span({style:{fontSize:'18px'}}, title),
      btn({className:'modal-close', onClick:onClose}, '\xd7')
    ),
    div({className:'modal-body'}, bodyEl),
    footerEl && div({className:'modal-foot'}, footerEl)
  );
  overlay.appendChild(m);
  overlay.addEventListener('click', e => { if(e.target===overlay) onClose(); });
  document.body.appendChild(overlay);
  return { remove: () => overlay.remove() };
}
function actionSheet(items) {
  const overlay = div({className:'sheet-overlay'});
  const sheet   = div({className:'sheet'}, div({className:'sheet-handle'}));
  const close   = () => overlay.remove();
  for (const item of items) {
    sheet.appendChild(btn({className:'sheet-btn'+(item.danger?' danger':''), onClick:()=>{close();item.onClick();}}, item.label));
  }
  overlay.appendChild(sheet);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) close(); });
  document.body.appendChild(overlay);
}

// ─── FIELD HELPER ────────────────────────────────────────────────────────────
function fieldEl(labelText, value, onChange, opts={}) {
  const wrap = div({className:'field', style:opts.flex?{flex:1}:{}});
  if (labelText) wrap.appendChild(el('label',{}, labelText));
  const input = inp({type:opts.type||'text', inputmode:opts.type==='number'?'numeric':'text', value:value||'', placeholder:opts.placeholder||''});
  if (opts.autoFocus) setTimeout(()=>input.focus(),50);
  input.addEventListener('input', ()=>onChange(input.value));
  wrap.appendChild(input);
  const errSpan = span({className:'err',style:{display:'none'}});
  wrap.appendChild(errSpan);
  wrap._input = input;
  wrap.setError = msg => { errSpan.textContent=msg; errSpan.style.display=msg?'':'none'; input.style.borderColor=msg?'#BB5050':'#E4E3DE'; };
  return wrap;
}

// ─── GRADE SELECTOR ──────────────────────────────────────────────────────────
function gradeSelector(current, onChange) {
  const rows=[['AA','A','A-'],['B+','B','B-'],['C+','C','C-'],['D','E']];
  let selected = current;
  const wrap = div({className:'grade-grid'});
  const allBtns = {};
  function refresh() {
    for (const [g,b] of Object.entries(allBtns)) {
      b.style.background = g===selected ? GRADE_COLOR[g] : GRADE_COLOR[g]+'40';
      b.style.color      = g===selected ? '#fff' : '#2E2E2E';
      b.style.fontWeight = g===selected ? 'bold' : 'normal';
    }
  }
  for (const row of rows) {
    const rowEl = div({className:'grade-row'});
    for (const g of row) {
      const b = btn({className:'grade-btn', onClick:()=>{ selected=g; refresh(); onChange(g); }}, g);
      allBtns[g] = b; rowEl.appendChild(b);
    }
    wrap.appendChild(rowEl);
  }
  refresh();
  return wrap;
}

function sectionDialog(movement, allSections, editSection, onSave) {

  const setErr=msg=>{err.textContent=msg;err.style.display=msg?'':'none';};

    const s=parseInt(start),e=parseInt(end);

  const foot = div({style:{display:'flex',gap:'8px'}},
    btn({className:'btn',onClick:()=>m.remove()},'Cancel'),
    btn({className:'btn-primary',onClick:async()=>{
      if(!movName.trim()) return;
      const targetWork = IDX.workById.get(targetWorkId);
      if(!targetWork) return;
      const targetMovs = IDX.movsByWork.get(targetWorkId)||[];
      const orderIndex = targetMovs.length;
      const sourceMov = IDX.movsByWork.get(sourceWork.id)||[];
      const ops=[];
      if (sourceMov.length===1) {
        const sm = sourceMov[0];
        const newMovId = await dbPut('movements',{workId:targetWorkId,name:movName.trim(),totalMeasures:sm.totalMeasures,targetBpm:sm.targetBpm,notes:sm.notes||'',orderIndex,tag:sm.tag||'Current'});
        const newMovRec={id:newMovId,workId:targetWorkId,name:movName.trim(),totalMeasures:sm.totalMeasures,targetBpm:sm.targetBpm,notes:sm.notes||'',orderIndex,tag:sm.tag||'Current'};
        ops.push({type:'put',store:'movements',record:newMovRec});
        const secs = IDX.secsByMov.get(sm.id)||[];
        for (const s of secs) {await dbPut('sections',{...s,movementId:newMovId});ops.push({type:'put',store:'sections',record:{...s,movementId:newMovId}});}
        await dbDel('movements',sm.id);ops.push({type:'del',store:'movements',id:sm.id});
      } else {
        for (let i=0;i<sourceMov.length;i++) {
          const sm=sourceMov[i];
          const updated={...sm,workId:targetWorkId,orderIndex:targetMovs.length+i};
          await dbPut('movements',updated);ops.push({type:'put',store:'movements',record:updated});
        }
      }
      const cId = sourceWork.composerId;
      await dbDel('works',sourceWork.id);ops.push({type:'del',store:'works',id:sourceWork.id});
      if(!STATE.works.some(w=>w.id!==sourceWork.id&&w.composerId===cId)){
        await dbDel('composers',cId);ops.push({type:'del',store:'composers',id:cId});
      }
      const uw={...targetWork,lastWorked:Date.now()};
      await dbPut('works',uw);ops.push({type:'put',store:'works',record:uw});
      m.remove();
      applyMutations(ops,[targetWorkId]);
      navigate({screen:'work',workId:targetWorkId,composerName:IDX.composerById.get(targetWork.composerId)?.name||''});
    }},'Convert')
  );
  const m = modal('Convert to Movement', body, foot, ()=>m.remove());
}

// ─── APP STATE ────────────────────────────────────────────────────────────────
let STATE = {composers:[],works:[],movements:[],sections:[]};
let NAV   = {screen:'home'};
async function reload() {
  const raw = await loadAll();
  // ── Migration: move tags from works→movements, Finished/Shelved→Inactive ──
  const movUpdates = [];
  for (const m of raw.movements) {
    if (!m.tag) {
      // Inherit from parent work, migrating old values
      const w = raw.works.find(x=>x.id===m.workId);
      const wTag = w?.tag||'Inactive';
      const migrated = (wTag==='Finished'||wTag==='Shelved') ? 'Inactive' : wTag;
      const updated = {...m, tag: migrated};
      movUpdates.push(updated);
      await dbPut('movements', updated);
    } else if (m.tag==='Shelved' || m.tag==='Finished') {
      // Finished was manual before — migrate to Inactive (auto-tag will re-evaluate)
      const updated = {...m, tag:'Inactive'};
      movUpdates.push(updated);
      await dbPut('movements', updated);
    }
  }
  if (movUpdates.length) {
    for (const u of movUpdates) {
      const i = raw.movements.findIndex(m=>m.id===u.id);
      if (i>=0) raw.movements[i]=u;
    }
  }

  // Backfill lastSessionAt on movements from actual session timestamps
  const allSessions = await dbAll('sessions');
  const lsMap = buildLastSessionMap(allSessions);
  for (let i=0; i<raw.movements.length; i++) {
    const m = raw.movements[i];
    const ts = lsMap.get(m.id) || 0;
    const cur = m.lastSessionAt || 0;
    if (ts !== cur) {
      const updated = {...m, lastSessionAt: ts||undefined};
      raw.movements[i] = updated;
      await dbPut('movements', updated);
    }
  }
  STATE = raw;
  buildIndex(raw);
  render();
}
function navigate(nav) { if(_activeMetro){_activeMetro.stop();_activeMetro=null;} _metroOpenState.clear(); NAV={...nav,tabIdx:undefined}; render(); }
function goBack() {
  if (NAV.screen==='work') navigate({screen:'composer',composerName:NAV.composerName});
  else navigate({screen:'home'});
}

// ─── SECTION ROW ──────────────────────────────────────────────────────────────
function sectionRow(section, idx, allSections, movement, workId) {
  const sorted=[...allSections].sort((a,b)=>a.startMeasure-b.startMeasure);
  const myIdx=sorted.findIndex(s=>s.id===section.id);
  const prev=myIdx>0?sorted[myIdx-1]:null;
  const next=myIdx<sorted.length-1?sorted[myIdx+1]:null;
  const canSplit=section.endMeasure>section.startMeasure;
  const canMergePrev=prev&&prev.endMeasure===section.startMeasure-1;
  const canMergeNext=next&&next.startMeasure===section.endMeasure+1;
  const sectionLabel = section.name || ('Section '+(idx+1));

  async function wTouch() {
    const w=IDX.workById.get(workId);
    const uw={...w,lastWorked:Date.now()};
    await dbPut('works',uw);
    return {type:'put',store:'works',record:uw};
  }

  const openEdit = () => sectionDialog(movement,allSections,section,async(s,e,g,n)=>{
    const updated={...section,startMeasure:s,endMeasure:e,grade:g,name:n||''};
    await dbPut('sections',updated);
    const wop=await wTouch();
    applyMutations([{type:'put',store:'sections',record:updated},wop],[workId]);
  });

  const menuItems=[
    {label:'Edit',onClick:openEdit},
    ...(canSplit?[{label:'Split',onClick:()=>splitDialog(section,async at=>{
      await dbDel('sections',section.id);
      const id1=await dbPut('sections',{movementId:section.movementId,startMeasure:section.startMeasure,endMeasure:at,grade:section.grade,name:''});
      const id2=await dbPut('sections',{movementId:section.movementId,startMeasure:at+1,endMeasure:section.endMeasure,grade:section.grade,name:''});
      const wop=await wTouch();
      applyMutations([
        {type:'del',store:'sections',id:section.id},
        {type:'put',store:'sections',record:{id:id1,movementId:section.movementId,startMeasure:section.startMeasure,endMeasure:at,grade:section.grade,name:''}},
        {type:'put',store:'sections',record:{id:id2,movementId:section.movementId,startMeasure:at+1,endMeasure:section.endMeasure,grade:section.grade,name:''}},
        wop
      ],[workId]);
    })}]:[]),
    ...((canMergePrev||canMergeNext)?[{label:'Merge with adjacent',onClick:()=>mergeDialog(section,canMergePrev?prev:null,canMergeNext?next:null,async(other,grade)=>{
      const s=Math.min(section.startMeasure,other.startMeasure),e=Math.max(section.endMeasure,other.endMeasure);
      await dbDel('sections',section.id); await dbDel('sections',other.id);
      const id=await dbPut('sections',{movementId:section.movementId,startMeasure:s,endMeasure:e,grade,name:''});
      const wop=await wTouch();
      applyMutations([
        {type:'del',store:'sections',id:section.id},
        {type:'del',store:'sections',id:other.id},
        {type:'put',store:'sections',record:{id,movementId:section.movementId,startMeasure:s,endMeasure:e,grade,name:''}},
        wop
      ],[workId]);
    })}]:[]),
    {label:'Delete section',danger:true,onClick:async()=>{
      await dbDel('sections',section.id);
      const wop=await wTouch();
      applyMutations([{type:'del',store:'sections',id:section.id},wop],[workId]);
    }}
  ];

  return div({style:{display:'flex',alignItems:'center',gap:'12px',background:'var(--bg2)',borderRadius:'10px',padding:'10px 12px',marginBottom:'8px',cursor:'pointer'},onClick:openEdit},
    gradeBadge(section.grade),
    div({style:{flex:'1'}},
      div({style:{fontSize:'14px',fontWeight:'bold',color:'var(--text)'}},sectionLabel),
      div({style:{fontSize:'13px',color:'var(--sub)'}},'mm. '+section.startMeasure+'\u2013'+section.endMeasure)
    ),
    btn({className:'btn-icon',onClick:e=>{e.stopPropagation();actionSheet(menuItems);}},'\u22ef')
  );
}

// ─── MOVEMENT TAB ─────────────────────────────────────────────────────────────
function movementTab(movement, workId) {
  const mySections=(IDX.secsByMov.get(movement.id)||[]).slice().sort((a,b)=>a.startMeasure-b.startMeasure);
  const mastery=movMastery(movement);
  const siblings=IDX.movsByWork.get(workId)||[];
  const siblingsCount=siblings.length;
  const myIdx=siblings.findIndex(m=>m.id===movement.id);
  const work=IDX.workById.get(workId);
  const composer=IDX.composerById.get(work?.composerId);

  // ── Reorder helpers ──
  async function moveUp() {
    if(myIdx<=0) return;
    const other=siblings[myIdx-1];
    const a={...movement,orderIndex:other.orderIndex};
    const b={...other,orderIndex:movement.orderIndex};
    await dbPut('movements',a); await dbPut('movements',b);
    applyMutations([{type:'put',store:'movements',record:a},{type:'put',store:'movements',record:b}]);
  }
  async function moveDown() {
    if(myIdx>=siblingsCount-1) return;
    const other=siblings[myIdx+1];
    const a={...movement,orderIndex:other.orderIndex};
    const b={...other,orderIndex:movement.orderIndex};
    await dbPut('movements',a); await dbPut('movements',b);
    applyMutations([{type:'put',store:'movements',record:a},{type:'put',store:'movements',record:b}]);
  }

  const pbarRow=div({style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'22px'}});
  pbarRow.appendChild(div({style:{flex:'1'}},progressBar(movement.totalMeasures,mySections)));
  pbarRow.appendChild(div({style:{fontSize:'16px',fontWeight:'bold',minWidth:'52px',textAlign:'right'}},pct(mastery)));

  // ── Reorder buttons (only if multi-movement) ──
  const reorderBtns = siblingsCount>1 ? div({style:{display:'flex',flexDirection:'column',gap:'0px',marginLeft:'4px'}},
    btn({className:'reorder-btn',onClick:moveUp,style:{opacity:myIdx===0?'0.2':'1'}}, '▲'),
    btn({className:'reorder-btn',onClick:moveDown,style:{opacity:myIdx===siblingsCount-1?'0.2':'1'}}, '▼')
  ) : null;

  const editBtn=btn({className:'btn',style:{padding:'5px 12px',fontSize:'13px'},
    onClick:()=>movementDialog(movement,async(name,totalMeasures,targetBpm,notes)=>{
      const updated={...movement,name,totalMeasures,targetBpm,notes};
      await dbPut('movements',updated);
      const w=IDX.workById.get(workId);
      const uw={...w,lastWorked:Date.now()};
      await dbPut('works',uw);
      applyMutations([{type:'put',store:'movements',record:updated},{type:'put',store:'works',record:uw}],[workId]);
    },async()=>{
      const secs=IDX.secsByMov.get(movement.id)||[];
      const ops=[{type:'del',store:'movements',id:movement.id}];
      for(const s of secs){await dbDel('sections',s.id);ops.push({type:'del',store:'sections',id:s.id});}
      await dbDel('movements',movement.id);
      const w=IDX.workById.get(workId);
      const uw={...w,lastWorked:Date.now()};
      await dbPut('works',uw);
      ops.push({type:'put',store:'works',record:uw});
      applyMutations(ops,[workId]);
    })},'Edit');
  const tagBtn=btn({className:'btn',style:{padding:'5px 12px',fontSize:'13px'},
    onClick:()=>tagDialog(movement.tag||'Inactive',async tag=>{
      const updated={...movement,tag};
      await dbPut('movements',updated);
      applyMutations([{type:'put',store:'movements',record:updated}],[workId]);
    })}, tagChip(computeMovTag(movement)));
  const extractBtn=siblingsCount>1?btn({className:'btn',style:{padding:'5px 12px',fontSize:'13px'},
    onClick:()=>extractToWorkDialog(movement,workId)},'\u2197 Extract'):null;
  const headerBtns=div({style:{display:'flex',gap:'6px',flexShrink:'0',marginTop:'2px',alignItems:'center'}},
    reorderBtns, editBtn, tagBtn, extractBtn);

  // ── Practice time — live element updated when sessions change ──
  const practiceEl = div({style:{fontSize:'13px',color:'#9E9E9E',marginBottom:'14px'}});

  // ── Notes block with toggle ──
  let notesVisible = false;
  const notesContent = movement.notes ? div({className:'notes-block'},movement.notes) : null;
  const notesToggle = movement.notes ? btn({className:'notes-toggle',style:{marginBottom:'12px'}},
    (notesVisible ? '▾ ' : '▸ ') + 'Notes & feedback') : null;
  if (notesContent) notesContent.style.display = 'none';
  if (notesToggle) notesToggle.addEventListener('click',()=>{
    notesVisible=!notesVisible;
    notesContent.style.display=notesVisible?'':'none';
    notesToggle.textContent=(notesVisible?'▾ ':'▸ ')+'Notes & feedback';
  });

  // ── AI Summary block ──
  const aiBox=makeAiBox('mov:'+movement.id,
    ()=>generateSummary(movement,work?.title||'',composer?.name||'Unknown'));

  function refreshPracticeEl() {
    dbSessionsBySubject(movement.id,'movement').then(sessions=>{
      const totalMs=sessions.reduce((s,x)=>s+x.durationMs,0);
      practiceEl.textContent = totalMs>0
        ? fmtDurationHM(totalMs)+' across '+sessions.length+' session'+(sessions.length!==1?'s':'')
        : '';
    });
  }
  refreshPracticeEl();

  const timerBlock=makeTimerBlock(movement.id,'movement',s=>{
    sessionLog.onSessionAdded(s);
    refreshPracticeEl();
  },true/*inline*/);
  const metro=makeMetronomeBlock(movement,'movements');
  const sessionLog=makeSessionLog(movement.id,'movement', ()=>refreshPracticeEl());

  // Inline timer row: timer on left, metronome toggle on right
  const timerRow=div({style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:'6px',marginBottom:'12px'}},
    timerBlock,
    metro.toggleBtn
  );

  return div({className:'section-content'},
    div({style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'2px'}},
      div({},
        div({style:{fontSize:'19px',fontWeight:'bold',color:'var(--text)'}},movement.name),
        div({style:{fontSize:'13px',color:'var(--sub)',marginTop:'2px'}},movement.totalMeasures+' measures \u00b7 BPM = '+movement.targetBpm)
      ),
      headerBtns
    ),
    timerRow,
    metro.el,
    practiceEl,
    pbarRow,
    notesToggle,
    notesContent,
    aiBox,
    div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},
      span({className:'label'},'Sections'),
      btn({className:'btn',style:{padding:'4px 10px',fontSize:'13px'},
        onClick:()=>sectionDialog(movement,mySections,null,async(s,e,grade,name)=>{
          const id=await dbPut('sections',{movementId:movement.id,startMeasure:s,endMeasure:e,grade,name:name||''});
          const rec={id,movementId:movement.id,startMeasure:s,endMeasure:e,grade,name:name||''};
          const w=IDX.workById.get(workId);
          const uw={...w,lastWorked:Date.now()};
          await dbPut('works',uw);
          applyMutations([{type:'put',store:'sections',record:rec},{type:'put',store:'works',record:uw}],[workId]);
        })},'+ Add')
    ),
    mySections.length===0 ? para({style:{fontSize:'14px',color:'var(--muted)'}},'No sections yet. Add one to track your progress.') : null,
    ...mySections.map((s,i)=>sectionRow(s,i,mySections,movement,workId)),
    div({style:{marginTop:'24px',borderTop:'1px solid var(--border)',paddingTop:'18px'}}),
    sessionLog.el
  );
}

// ─── REUSABLE AI BOX ─────────────────────────────────────────────────────────
function makeAiBox(cacheKey, generateFn) {
  const box=div({style:{marginBottom:'18px'}});
  function render(state,text) {
    box.innerHTML='';
    if (state==='empty') {
      box.appendChild(btn({className:'btn',style:{padding:'4px 10px',fontSize:'13px',color:'#5B6FA8'},
        onClick:async()=>{
          render('loading');
          try{const r=await generateFn();
            if(r){await saveSummary(cacheKey,r);render('done',r);}
            else render('empty');
          }catch(e){render('error',e.message);}
        }},'✦ Generate summary'));
    } else if (state==='loading') {
      box.appendChild(div({style:{fontSize:'13px',color:'#9E9E9E',padding:'4px 0'}},'Generating…'));
    } else if (state==='done') {
      const head=div({className:'ai-box-head'},
        span({style:{fontSize:'11px',letterSpacing:'.5px',fontWeight:'bold',color:'#5B6FA8',textTransform:'uppercase'}},'AI Summary'),
        div({style:{display:'flex',gap:'4px'}},
          btn({className:'btn',style:{padding:'2px 8px',fontSize:'12px',color:'#5B6FA8'},onClick:async()=>{
            render('loading');
            try{const r=await generateFn();
              if(r){await saveSummary(cacheKey,r);render('done',r);}
              else render('empty');
            }catch(e){render('error',e.message);}
          }},'↺ Regenerate'),
          btn({className:'btn',style:{padding:'2px 8px',fontSize:'12px',color:'#BB5050'},onClick:async()=>{
            await deleteSummary(cacheKey);render('empty');
          }},'✕')
        )
      );
      box.appendChild(div({className:'ai-box'},head,
        div({style:{fontSize:'14px',lineHeight:'1.7',color:'#2E2E2E',whiteSpace:'pre-wrap'}},text)));
    } else if (state==='error') {
      const errDiv=div({style:{fontSize:'13px',color:'#BB5050',padding:'4px 0'}},'Error: '+text+' — ');
      const retry=btn({className:'btn',style:{padding:'0',fontSize:'13px',color:'#5B6FA8',display:'inline'}},'Try again');
      retry.addEventListener('click',async()=>{
        render('loading');
        try{const r=await generateFn();
          if(r){await saveSummary(cacheKey,r);render('done',r);}
          else render('empty');
        }catch(e2){render('error',e2.message);}
      });
      errDiv.appendChild(retry);
      box.appendChild(errDiv);
    }
  }
  render('empty');
  getSummary(cacheKey).then(s=>{ if(s) render('done',s.text); });
  return box;
}

// ─── METRONOME ────────────────────────────────────────────────────────────────
let _audioCtx = null;
let _activeMetro = null; // currently running metronome — stopped on tab/nav change
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;

  // Schedule sound at exact audio clock time — immune to JS timer jitter
  const ctx = getAudioCtx();
  const t = atTime || ctx.currentTime;

  // Reuse shared compressor if it exists and context matches
  if (!_metroComp || _metroComp.context !== ctx) {
    _metroComp = ctx.createDynamicsCompressor();
    _metroComp.threshold.value = -3; _metroComp.knee.value = 2; _metroComp.ratio.value = 12;
    _metroComp.attack.value = 0.0005; _metroComp.release.value = 0.03;
    _metroComp.connect(ctx.destination);
  }
  const comp = _metroComp;

  function hiTick(freq, gain) {
    const m = ctx.createGain(); m.connect(comp);
    const bsz = Math.floor(ctx.sampleRate * 0.012);
    if (!_metroBuf || _metroBuf.sampleRate !== ctx.sampleRate) {
      _metroBuf = ctx.createBuffer(1, bsz, ctx.sampleRate);
      const d = _metroBuf.getChannelData(0);
      for (let i = 0; i < bsz; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bsz * 0.18));
    }
    const ns = ctx.createBufferSource(); ns.buffer = _metroBuf;
    const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = freq; hp.Q.value = 0.7;
    const ng = ctx.createGain(); ng.gain.setValueAtTime(gain, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.012);
    ns.connect(hp); hp.connect(ng); ng.connect(m); ns.start(t); ns.stop(t + 0.015);
    const o = ctx.createOscillator(), og = ctx.createGain(); o.type = 'sine';
    o.frequency.setValueAtTime(freq * 0.4, t); o.frequency.exponentialRampToValueAtTime(freq * 0.2, t + 0.02);
    og.gain.setValueAtTime(gain * 0.35, t); og.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
    o.connect(og); og.connect(m); o.start(t); o.stop(t + 0.025);
  }

  if (type === 'down')      hiTick(6000, 4.5);
  else if (type === 'beat') hiTick(4500, 3.5);
  else                      hiTick(3000, 1.8);
}
let _metroComp = null, _metroBuf = null; // shared audio nodes across ticks

const _metroOpenState = new Map(); // persist metro open state across re-renders keyed by record.id

function makeMetronomeBlock(record, store) {
  // Works for both movements (store='movements') and exercises (store='exercises')
  let baseBpm   = record.targetBpm || record.metroBpm || 120;
  let metroBpm  = record.metroBpm  || baseBpm;
  let beats     = record.metroBeats || 4;
  let subs      = record.metroSubs  || 1;
  let open      = _metroOpenState.get(record.id) || false;

  let running = false;
  let beatIdx = 0, subIdx = 0;
  let tickTimer = null;
  let tapTimes = [], tapClearTimer = null;

  async function savePrefs() {
    const current = store==='movements' ? IDX.movById.get(record.id) : (await dbAll('exercises')).find(e=>e.id===record.id);
    if (!current) return;
    const updated = {...current, metroBpm, metroBeats:beats, metroSubs:subs, metroOpen:open};
    await dbPut(store, updated);
    if (store==='movements') applyMutations([{type:'put', store:'movements', record:updated}]);
  }

  // ── DOM ──
  const container = div({});

  // Toggle button (metronome icon ♩ in the timer row)
  const toggleBtn = btn({className:'metro-toggle'+(open?' active':''), title:'Metronome',
    onClick:()=>{ open=!open; _metroOpenState.set(record.id,open); toggleBtn.classList.toggle('active',open); panel.style.display=open?'':'none'; savePrefs(); }},
    (()=>{
      const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
      s.setAttribute('viewBox','0 0 24 24'); s.setAttribute('width','20'); s.setAttribute('height','20');
      s.setAttribute('fill','none'); s.setAttribute('stroke','currentColor');
      s.setAttribute('stroke-width','1.8'); s.setAttribute('stroke-linecap','round'); s.setAttribute('stroke-linejoin','round');
      // Triangle metronome icon
      const base=document.createElementNS('http://www.w3.org/2000/svg','path');
      base.setAttribute('d','M12 3 L21 20 L3 20 Z');
      s.appendChild(base);
      return s;
    })()
  );

  // Pulse dots
  const pulsesEl = div({className:'metro-pulses'});
  function buildDots() {
    pulsesEl.innerHTML = '';
    for (let b = 0; b < beats; b++) {
      if (b > 0) { const sep=div({className:'metro-beat-sep'}); pulsesEl.appendChild(sep); }
      const grp = div({className:'metro-pulse-group'});
      for (let s = 0; s < subs; s++) {
        const d = div({className:'metro-dot'}); d.id='mdot-'+record.id+'-'+b+'-'+s;
        grp.appendChild(d);
      }
      pulsesEl.appendChild(grp);
    }
  }
  function flashDot(b, s, type) {
    const d = document.getElementById('mdot-'+record.id+'-'+b+'-'+s);
    if (!d) return;
    d.classList.remove('flash-down','flash-beat','flash-sub');
    d.classList.add(type==='down'?'flash-down':type==='beat'?'flash-beat':'flash-sub');
    const flashMs = Math.min(90, (60000/metroBpm/subs)*0.65);
    setTimeout(()=>d.classList.remove('flash-down','flash-beat','flash-sub'), flashMs);
  }
  function clearDots() {
    document.querySelectorAll('[id^="mdot-'+record.id+'"]').forEach(d=>
      d.classList.remove('flash-down','flash-beat','flash-sub'));
  }

  // BPM display
  const bpmInp = el('input',{type:'number',min:'20',max:'300',value:String(metroBpm)});
  bpmInp.addEventListener('change',()=>{ const v=parseInt(bpmInp.value); if(!isNaN(v)&&v>=20&&v<=300) setBpm(v); });
  const bpmDisplay = div({className:'metro-bpm-val'}, bpmInp);

  function setBpm(v) {
    metroBpm = Math.max(20, Math.min(300, Math.round(v)));
    bpmInp.value = metroBpm;
    updatePresets();
    restartIfRunning();
    savePrefs();
  }

  // Preset buttons
  const PRESETS = [{label:'½', mult:0.5},{label:'¾', mult:0.75},{label:'1', mult:1}];
  const presetBtns = PRESETS.map(p => {
    const b = btn({className:'metro-preset', onClick:()=>{ setBpm(Math.round(baseBpm*p.mult)); }}, p.label);
    return {btn:b, mult:p.mult};
  });
  function updatePresets() {
    presetBtns.forEach(({btn:b, mult})=>{
      b.classList.toggle('active', Math.round(baseBpm*mult)===metroBpm);
    });
  }
  updatePresets();
  const presetsRow = div({className:'metro-presets'}, ...presetBtns.map(p=>p.btn));

  // Adj buttons — simple tap only, no hold (hold causes runaway BPM on mobile)
  const adjDown = btn({className:'metro-bpm-adj', onClick:()=>setBpm(metroBpm-1)}, '−');
  const adjUp   = btn({className:'metro-bpm-adj', onClick:()=>setBpm(metroBpm+1)}, '+');

  // Beats options
  const beatsOpts = [1,2,3,4,5,6].map(n => {
    const b = btn({className:'metro-opt'+(beats===n?' active':''), onClick:()=>{
      beats=n; beatsOpts.forEach((x,i)=>x.classList.toggle('active',[1,2,3,4,5,6][i]===n));
      buildDots(); restartIfRunning(); savePrefs();
    }}, String(n));

  });

  // Subs options
  const subsOpts = [1,2,3,4].map(n => {
    const b = btn({className:'metro-opt'+(subs===n?' active':''), onClick:()=>{
      subs=n; subsOpts.forEach((x,i)=>x.classList.toggle('active',[1,2,3,4][i]===n));

  // ── Tick engine — lookahead scheduler ──
  // Audio clock schedules sounds ahead of time; JS timer only tops up the queue.
  // This is immune to JS thread jitter and Android timer throttling.
  const LOOKAHEAD_MS  = 100.0; // how often the scheduler fires (ms)
  const SCHEDULE_AHEAD = 0.15; // how far ahead to schedule audio (seconds)

  let generation   = 0;
  let nextTickTime = 0;  // audio context time of next scheduled tick

      const intervals = [];
      for (let i=1;i<tapTimes.length;i++) intervals.push(tapTimes[i]-tapTimes[i-1]);

  // Assemble panel
  const panel = div({className:'metro-panel', style:{display:open?'':'none'}},
    div({className:'metro-bpm-row'}, adjDown, bpmDisplay, adjUp),
    div({className:'metro-bpm-label'}, 'BPM'),
    presetsRow,
    pulsesEl,
    div({className:'metro-settings-row'},
      div({className:'metro-setting'},
        div({className:'metro-setting-label'},'Beats'),
        div({className:'metro-opts'}, ...beatsOpts)
      ),
      div({className:'metro-setting'},
        div({className:'metro-setting-label'},'Subdivisions'),
        div({className:'metro-opts'}, ...subsOpts)
      )
    ),
    div({className:'metro-bottom-row'}, tapBtn, playBtn)
  );

  buildDots();
  container.appendChild(panel);
  // Stop any previously active metronome and register this one
  if (_activeMetro) _activeMetro.stop();
  const metroRef = {el:container, toggleBtn, stop: stopMetro};
  _activeMetro = metroRef;
  return metroRef;
}

// ─── TIMER COMPONENT ─────────────────────────────────────────────────────────
// subjectId: movementId or exerciseId, subjectType: 'movement'|'exercise'
// onSessionSaved: callback after a session is saved to DB
function makeTimerBlock(subjectId, subjectType, onSessionSaved, inline=false) {
  let worker=null, startTs=null, elapsed=0, running=false;
  const lsKey='timer_'+subjectType+'_'+subjectId;
  const saved=localStorage.getItem(lsKey);
  if (saved) { try { const d=JSON.parse(saved); startTs=d.startTs; running=true; elapsed=Date.now()-startTs; } catch{} }

  const display=div({className: inline?'timer-inline-display':'timer-display'}, fmtDuration(elapsed));
  const startBtn=btn({className: inline?'timer-inline-btn timer-inline-start':'timer-btn timer-btn-start'}, 'Start');
  const stopBtn=btn({className: inline?'timer-inline-btn timer-inline-stop':'timer-btn timer-btn-stop',style:{display:'none'}}, inline?'Stop':'Stop & Log');

  function tick() {
    if (!running||!startTs) return;
    elapsed=Date.now()-startTs;
    display.textContent=fmtDuration(elapsed);
  }
  function start() {
    startTs=Date.now()-elapsed;
    running=true;
    localStorage.setItem(lsKey,JSON.stringify({startTs}));
    startBtn.style.display='none'; stopBtn.style.display='';
    worker=createTimerWorker(tick);
    worker.postMessage('start');
  }
  function stop() {
    if (worker){worker.postMessage('stop');URL.revokeObjectURL(worker._url);worker.terminate();worker=null;}
    running=false;
    localStorage.removeItem(lsKey);
    startBtn.style.display=''; stopBtn.style.display='none';
    const finalMs=elapsed;
    elapsed=0; display.textContent=fmtDuration(0);
    addSessionDialog(subjectId, subjectType, finalMs, onSessionSaved, true);
  }
  startBtn.addEventListener('click',start);
  stopBtn.addEventListener('click',stop);
  if (running) { startBtn.style.display='none'; stopBtn.style.display=''; worker=createTimerWorker(tick); worker.postMessage('start'); tick(); }

  if (inline) return div({className:'timer-inline'}, display, startBtn, stopBtn);
  return div({className:'timer-block'}, display, startBtn, stopBtn);
}

// ─── ADD SESSION DIALOG ───────────────────────────────────────────────────────
// fromTimer: if true, defaultMs came from the timer (we convert to whole seconds internally)
// if false (manual), we show minutes input
function addSessionDialog(subjectId, subjectType, defaultMs, onSaved, fromTimer=false) {
  // fromTimer → pre-fill minutes (rounded), user edits minutes
  // manual → blank minutes field
  const defaultMins = defaultMs>0 ? Math.max(1, Math.round(defaultMs/60000)).toString() : '';
  let mins = defaultMins;
  let note='';
  let ts=Date.now();

  const fMins=fieldEl('Duration (minutes)', mins, v=>mins=v, {type:'number',autoFocus:!defaultMs,min:'1'});
  // Date/time picker — use local time (not UTC) for the default value
  const localDtStr = d => {
    const pad = n => String(n).padStart(2,'0');
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
  };
  const dtStr=localDtStr(new Date(ts));
  const dtInp=el('input',{type:'datetime-local',value:dtStr,
    style:{fontSize:'14px',padding:'8px 10px',border:'1.5px solid var(--border)',borderRadius:'var(--radius)',background:'#fff',color:'var(--text)',outline:'none',width:'100%',fontFamily:'inherit'}});
  dtInp.addEventListener('change',()=>ts=new Date(dtInp.value).getTime());
  const ta=el('textarea',{placeholder:'Session note (optional)',rows:'2',
    style:{fontSize:'14px',padding:'9px 12px',border:'1.5px solid var(--border)',borderRadius:'var(--radius)',background:'#fff',color:'var(--text)',outline:'none',width:'100%',resize:'none',lineHeight:'1.5',fontFamily:'inherit'}});
  ta.addEventListener('input',()=>note=ta.value);
  const err=span({className:'err',style:{display:'none'}});
  const body=div({style:{display:'flex',flexDirection:'column',gap:'12px'}},
    fMins,
    div({className:'field'},el('label',{},'Date & time'),dtInp),
    div({className:'field'},el('label',{},'Note (optional)'),ta),
    err
  );
  const foot=div({style:{display:'flex',gap:'8px'}},
    btn({className:'btn',onClick:()=>m.remove()},'Cancel'),
    btn({className:'btn-primary',onClick:async()=>{
      const mVal=parseFloat(mins);
      if(isNaN(mVal)||mVal<=0){err.textContent='Enter a valid duration';err.style.display='';return;}
      // If from timer, use the raw ms (more precise); otherwise convert minutes
      const durationMs = fromTimer && defaultMs>0 ? defaultMs : Math.round(mVal*60000);
      const id=await dbPut('sessions',{subjectId,subjectType,durationMs,timestamp:ts,note:note.trim()});
      const date=localDateStr(ts);
      await upsertDailyTotal(date,subjectId,subjectType,durationMs);
      // Update movement.lastSessionAt if this is a movement session
      if (subjectType==='movement') {
        const mov=IDX.movById.get(subjectId);
        if (mov) {
          const updMov={...mov,lastWorked:ts,lastSessionAt:ts};
          await dbPut('movements',updMov);
          applyMutations([{type:'put',store:'movements',record:updMov}]);
        }
      }
      m.remove();
      if(onSaved) onSaved({id,subjectId,subjectType,durationMs,timestamp:ts,note:note.trim()});
    }},'Log session')
  );
  const m=modal('Log Practice Session',body,foot,()=>m.remove());
}

// ─── SESSION LOG COMPONENT ────────────────────────────────────────────────────
function makeSessionLog(subjectId, subjectType, onNewSession) {
  const container=div({style:{marginBottom:'18px'}});
  let sessions=[];

  function refresh() {
    container.innerHTML='';
    const header=div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},
      span({className:'label'},'Practice log'),
      btn({className:'btn',style:{padding:'2px 10px',fontSize:'13px'},onClick:()=>{
        addSessionDialog(subjectId,subjectType,0,s=>{sessions.unshift(s);refresh();});
      }},'+ Add')
    );
    container.appendChild(header);
    if (!sessions.length) {
      container.appendChild(para({style:{fontSize:'13px',color:'#9E9E9E',marginBottom:'8px'}},'No sessions logged yet.'));
      return;
    }
    const listEl=div({style:{background:'var(--bg2)',borderRadius:'10px',padding:'0 12px'}});
    for (const s of sessions) {
      const d=new Date(s.timestamp);
      const dateStr=d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      const timeStr=d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      const row=div({className:'session-row'},
        div({style:{flex:'1'}},
          div({style:{fontWeight:'bold',color:'var(--text)'}},fmtDurationLong(s.durationMs)),
          div({style:{color:'#9E9E9E',fontSize:'12px'}},dateStr+' · '+timeStr+(s.note?' · '+s.note:''))
        ),
        btn({className:'btn-icon',style:{fontSize:'18px',color:'#BDBDBD'},onClick:async(e)=>{
          e.stopPropagation();
          if(!confirm('Delete this session?')) return;
          const date=localDateStr(s.timestamp);
          await dbDel('sessions',s.id);
          await recomputeDailyTotal(date,s.subjectId,s.subjectType);
          sessions=sessions.filter(x=>x.id!==s.id);
          refresh();
        }},'✕')
      );
      listEl.appendChild(row);
    }
    container.appendChild(listEl);
  }

  // Load async
  dbSessionsBySubject(subjectId,subjectType).then(ss=>{
    sessions=ss.sort((a,b)=>b.timestamp-a.timestamp);
    refresh();
  });
  refresh();
  return {el:container, onSessionAdded:(s)=>{sessions.unshift(s);refresh();if(onNewSession)onNewSession(s);}};
}

        const rec={id,workId,name,totalMeasures,targetBpm,notes,orderIndex:movements.length,tag:'Inactive'};
        const uw={...work,lastWorked:Date.now()};
        await dbPut('works',uw);
        applyMutations([{type:'put',store:'movements',record:rec},{type:'put',store:'works',record:uw}],[workId]);
      })},
      {label:'Convert work to movement\u2026',onClick:()=>convertToMovementDialog(work,composerName)},
      {label:'Delete work',danger:true,onClick:async()=>{
        const ops=[];
        for(const m of movements){
          const secs=IDX.secsByMov.get(m.id)||[];
          for(const s of secs){await dbDel('sections',s.id);ops.push({type:'del',store:'sections',id:s.id});}
          await dbDel('movements',m.id);ops.push({type:'del',store:'movements',id:m.id});
        }
        const cId=work.composerId;
        await dbDel('works',work.id);ops.push({type:'del',store:'works',id:work.id});
        if(!STATE.works.some(w=>w.id!==work.id&&w.composerId===cId)){
          await dbDel('composers',cId);ops.push({type:'del',store:'composers',id:cId});
        }
        applyMutations(ops);
        navigate({screen:'home'});
      }}
    ])},'\u22ef')
  );
  screen.appendChild(topbar);

  const contentArea=div({style:{flex:'1',overflow:'hidden',display:'flex',flexDirection:'column'}});
  let tabBar=null;

  function setTab(idx) {
    currentTab=idx;
    NAV.tabIdx=idx;
    if (_activeMetro) { _activeMetro.stop(); _activeMetro=null; }
    contentArea.innerHTML='';
    if (movements.length===0) {
      contentArea.appendChild(div({className:'empty'},
        para({},'No movements yet.'),
        btn({className:'btn-primary',onClick:()=>movementDialog(null,async(name,totalMeasures,targetBpm,notes)=>{
          const id=await dbPut('movements',{workId,name,totalMeasures,targetBpm,notes,orderIndex:0,tag:'Inactive'});
          const rec={id,workId,name,totalMeasures,targetBpm,notes,orderIndex:0,tag:'Inactive'};
          const uw={...work,lastWorked:Date.now()};
          await dbPut('works',uw);
          applyMutations([{type:'put',store:'movements',record:rec},{type:'put',store:'works',record:uw}],[workId]);
        })},'Add a movement')
      ));
      return;
    }
    if (isMulti && idx===0) contentArea.appendChild(summaryTab(work,movements,setTab,isMulti));
    else {
      const movIdx=isMulti?idx-1:0;
      contentArea.appendChild(movementTab(movements[movIdx],workId));
    }
    if (tabBar) tabBar.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  }

  if (isMulti) {
    tabBar=div({className:'tabs'});
    ['Summary',...movements.map(m=>m.name)].forEach((name,i)=>{
      tabBar.appendChild(btn({className:'tab'+(i===currentTab?' active':''),onClick:()=>setTab(i)},name));
    });
    screen.appendChild(tabBar);
  }

  screen.appendChild(contentArea);
  setTab(currentTab);

  screen.appendChild(btn({className:'fab',onClick:()=>movementDialog(null,async(name,totalMeasures,targetBpm,notes)=>{
    const id=await dbPut('movements',{workId,name,totalMeasures,targetBpm,notes,orderIndex:movements.length,tag:'Inactive'});
    const rec={id,workId,name,totalMeasures,targetBpm,notes,orderIndex:movements.length,tag:'Inactive'};
    const uw={...work,lastWorked:Date.now()};
    await dbPut('works',uw);
    applyMutations([{type:'put',store:'movements',record:rec},{type:'put',store:'works',record:uw}],[workId]);
  })},'+'));

  return screen;
}
